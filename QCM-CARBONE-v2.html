<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🥖 QCM Bilan Carbone des Pains</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:linear-gradient(135deg,#0A1520,#0F1E30,#0D1A28);font-family:Georgia,Palatino,serif;color:#E8F4EC;display:flex;align-items:flex-start;justify-content:center;padding:20px 14px 40px}
.card{width:100%;max-width:680px;background:rgba(16,28,45,0.97);border-radius:18px;border:1px solid #1E3048;padding:28px 24px;box-shadow:0 20px 50px rgba(0,0,0,0.6)}
h1{font-size:24px;font-weight:700;letter-spacing:-0.5px;margin-bottom:4px}
.subtitle{color:#52B788;font-size:14px;font-style:italic;margin-bottom:14px}
.desc{color:#8A9DB5;font-size:14px;line-height:1.6;max-width:440px;margin:0 auto 20px}
.chips{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin-bottom:22px}
.chip{display:flex;align-items:center;gap:4px;border-radius:20px;padding:3px 9px;border:1px solid}
.chip-dot{width:7px;height:7px;border-radius:50%}
.chip span{font-size:10px;color:#8A9DB5}
.btn{background:linear-gradient(135deg,#2D6A4F,#40916C);color:#fff;border:none;border-radius:9px;padding:10px 22px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.btn:disabled{opacity:0.4;cursor:default}
.btn-sm{background:#1A2B3C;color:#8A9DB5;border:1px solid #2A3A52;border-radius:7px;padding:5px 12px;font-size:12px;cursor:pointer;font-family:inherit}
.btn-dark{background:#1A2335}
.btn-mid{background:#2A3A52}
.progress-wrap{height:3px;background:#1E3048;border-radius:2px;margin-bottom:14px;overflow:hidden}
.progress-bar{height:100%;background:linear-gradient(90deg,#2D6A4F,#52B788);border-radius:2px;transition:width 0.4s ease}
.quiz-meta{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.counter{color:#6A7D90;font-size:13px}
.badge{font-size:11px;color:#fff;border-radius:11px;padding:2px 9px;font-weight:600}
.ord-badge{font-size:11px;color:#E9A23B;border:1px solid #E9A23B;border-radius:8px;padding:2px 7px}
.score-chip{margin-left:auto;color:#52B788;font-size:13px;font-weight:700}
.q-text{color:#E8F4EC;font-size:17px;line-height:1.6;margin-bottom:20px;font-weight:500}
.options{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.opt{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:9px;font-size:14px;line-height:1.4;cursor:pointer;border:1px solid #2A3A52;background:#1A2335;color:#C8D8E8;transition:all 0.12s;font-family:inherit;width:100%;text-align:left}
.opt:hover:not(.locked){background:#162A4A;border-color:#52B788;color:#fff}
.opt.selected{background:#162A4A;border-color:#52B788;color:#fff}
.opt.correct{background:#1B3A2A;border-color:#52B788;color:#52B788}
.opt.wrong{background:#3A1B1B;border-color:#E07A5F;color:#E07A5F}
.opt.locked{cursor:default}
.letter{width:24px;height:24px;border-radius:50%;background:rgba(255,255,255,0.07);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.tick{margin-left:auto;font-size:15px}
.feedback{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:9px;border:1px solid;margin-bottom:12px}
.feedback.ok{background:#1B3A2A;border-color:#52B788;color:#52B788}
.feedback.ko{background:#3A1B1B;border-color:#E07A5F;color:#E07A5F}
.exp-btn{background:none;border:none;color:#52B788;cursor:pointer;font-size:12px;padding:3px 0;margin-bottom:5px;font-family:inherit}
.exp-box{background:#0F1E30;border:1px solid #1E3048;border-radius:9px;padding:12px 14px;color:#8ABFDB;font-size:13px;line-height:1.7;margin-bottom:12px;font-style:italic}
.actions{display:flex;gap:8px;justify-content:flex-end;margin-top:12px}
/* Drag order */
.drag-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:9px;border:1px solid #2A3A52;background:#1A2335;color:#C8D8E8;cursor:grab;user-select:none;margin-bottom:6px;transition:all 0.12s;font-size:14px}
.drag-item.dragging{background:#1E3860;border-color:#52B788}
.drag-item.correct-pos{background:#1B3A2A;border-color:#52B788;color:#52B788;cursor:default}
.drag-item.wrong-pos{background:#3A1B1B;border-color:#E07A5F;color:#E07A5F;cursor:default}
.drag-num{width:20px;height:20px;border-radius:50%;background:rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.drag-hint{color:#8A9DB5;font-size:13px;margin-bottom:8px;font-style:italic}
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:14px}
.match-left{padding:8px 12px;border-radius:8px;border:1px solid #2A3A52;background:#1A2335;color:#C8D8E8;font-size:13px;cursor:pointer;text-align:left;font-family:inherit}
.match-left.sel{border-color:#52B788;background:#162A4A;color:#fff}
.match-left.done-ok{border-color:#52B788;background:#1B3A2A;color:#52B788;cursor:default}
.match-left.done-ko{border-color:#E07A5F;background:#3A1B1B;color:#E07A5F;cursor:default}
.match-right{padding:8px 12px;border-radius:8px;border:1px solid #2A3A52;background:#131D2A;color:#8A9DB5;font-size:13px;cursor:pointer;text-align:left;font-family:inherit}
.match-right.linked{border-color:#40916C;color:#C8D8E8;background:#1A2B3C}
.match-right.done-ok{border-color:#52B788;background:#1B3A2A;color:#52B788;cursor:default}
.match-right.done-ko{border-color:#E07A5F;background:#3A1B1B;color:#E07A5F;cursor:default}
/* Filtre */
.cat-row{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:10px;cursor:pointer;border:1px solid #2A3A52;background:#131D2A;margin-bottom:5px}
.cat-row.active{background:rgba(82,183,136,0.05)}
.cat-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;background:#2A3A52}
.cat-name{color:#6A7D90;flex:1;font-size:13px}
.cat-row.active .cat-name{color:#C8D8E8}
.cat-count{color:#3A4A5A;font-size:12px}
.cat-row.active .cat-count{color:#52B788}
.cat-check{font-size:16px;margin-left:6px}
.total-count{text-align:center;color:#52B788;margin-bottom:12px;font-size:14px}
/* Résultats */
.results-header{text-align:center;margin-bottom:22px}
.big-score{font-size:50px;font-weight:800;margin:0 0 4px}
.pct{color:#8A9DB5;font-size:15px}
.theme-row{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.theme-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.theme-name{font-size:12px;flex:1;color:#C8D8E8}
.mini-bar-wrap{width:100px;height:5px;background:#1E3048;border-radius:3px;overflow:hidden;flex-shrink:0}
.mini-bar{height:100%;border-radius:3px}
.theme-score{font-size:12px;font-weight:700;min-width:36px;text-align:right}
.section-title{color:#8A9DB5;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.flex-center{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
/* Review */
.review-header{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.review-counter{color:#52B788;font-size:14px;font-weight:700}
/* Blank */
.blank-input{background:#0F1E30;border:1px solid #2A3A52;border-radius:6px;color:#E8F4EC;padding:3px 8px;font-size:14px;width:120px;font-family:inherit;outline:none}
.blank-input.ok{border-color:#52B788;color:#52B788}
.blank-input.ko{border-color:#E07A5F;color:#E07A5F}
.blank-correction{font-size:12px;color:#E07A5F;margin-top:2px}
/* Mode toggle */
.mode-toggle{display:flex;gap:0;border-radius:9px;overflow:hidden;border:1px solid #2A3A52;margin-bottom:14px;align-self:center}
.mode-btn{padding:7px 18px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:all 0.15s}
.mode-btn.active{background:linear-gradient(135deg,#2D6A4F,#40916C);color:#fff}
.mode-btn:not(.active){background:#1A2335;color:#6A7D90}
</style>
</head>

<script>
// ── DONNÉES ──────────────────────────────────────────────────────────────────
const Q=[
{id:1,cat:"Historique",type:"mcq",q:"En quelle année les premières versions du Bilan Carbone® ont-elles été développées ?",o:["1997","2002","2004","2011"],a:1,e:"2002 = premières versions de travail. 2004 = formalisation officielle par l'ADEME avec Jean-Marc Jancovici. 2011 = création de l'ABC. Ces 3 dates sont distinctes et importantes à retenir."},
{id:2,cat:"Historique",type:"mcq",q:"En quelle année la méthode Bilan Carbone® a-t-elle été officiellement formalisée par l'ADEME ?",o:["2000","2002","2004","2008"],a:2,e:"2004 = formalisation officielle. 2002 = travaux préparatoires. Co-développée avec Jean-Marc Jancovici du bureau d'étude Manicore."},
{id:3,cat:"Historique",type:"mcq",q:"En quelle année l'ABC (Association pour la transition Bas Carbone) a-t-elle été créée ?",o:["2004","2008","2011","2018"],a:2,e:"L'ABC a été créée en 2011 par l'ADEME et l'APCC pour reprendre la gouvernance de la méthode. Elle regroupe plus de 1 000 organisations engagées pour le climat."},
{id:4,cat:"Historique",type:"mcq",q:"Quel est le numéro de la version actuelle de la méthode mise en application en 2025 ?",o:["Version 7","Version 8","Version 9","Version 10"],a:2,e:"La v9 a été publiée en juillet 2024 et mise en application en 2025. La v8 datait de 2018. La méthode a connu 8 évolutions depuis sa création en 2004."},
{id:5,cat:"Historique",type:"mcq",q:"La démarche Bilan Carbone® est-elle obligatoire ou volontaire ?",o:["Obligatoire pour toutes les entreprises","Obligatoire pour les +500 salariés","Volontaire — aucune obligation légale","Obligatoire pour les entreprises cotées"],a:2,e:"Le BC® est entièrement VOLONTAIRE. À ne pas confondre avec le BEGES réglementaire (obligatoire pour +500 salariés, collectivités >50k hab.). Le BC® peut répondre aux exigences BEGES mais reste une démarche volontaire."},
{id:6,cat:"Historique",type:"mcq",q:"Le Bilan Carbone® désigne officiellement :",o:["Uniquement une méthode de calcul","Une méthode + outils + formations + une marque déposée","Un label RSE attribué par l'État","Uniquement une marque déposée par l'ADEME"],a:1,e:"Le BC® désigne 4 éléments : (1) méthode développée par l'ABC, (2) outils (tableurs, logiciels), (3) formations par organismes habilités, (4) marque® déposée à l'INPI en France et dans l'UE."},
{id:7,cat:"Historique",type:"mcq",q:"Quelle est la durée moyenne d'une mission Bilan Carbone® ?",o:["Quelques jours","Quelques semaines","Quelques mois","Plusieurs années"],a:2,e:"Quelques mois en moyenne : cadrage + gouvernance, collecte des données (souvent la phase la plus longue, 1-2 mois), analyse, comptabilisation, puis restitution."},
{id:8,cat:"Objectifs & Principes",type:"mcq",q:"Quelle est la philosophie centrale du Bilan Carbone® ?",o:["Mesurer pour publier","Compter pour agir","Réduire pour compenser","Agir pour communiquer"],a:1,e:"« Compter pour agir » : la comptabilisation n'est pas une fin en soi mais un outil au service de l'action et de la réduction. Cela distingue le BC® d'un simple exercice de reporting RSE."},
{id:9,cat:"Objectifs & Principes",type:"mcq",q:"Quels sont les 3 grands objectifs de la méthode Bilan Carbone® ?",o:["Mesurer, Compenser, Communiquer","Mobiliser, Comptabiliser, Élaborer un plan de transition","Réduire, Certifier, Publier","Inventorier, Analyser, Compenser"],a:1,e:"Les 3 objectifs INDISSOCIABLES : (1) MOBILISER les PP internes et externes, (2) COMPTABILISER les émissions directes et indirectes, (3) Élaborer un PLAN DE TRANSITION ambitieux, pilotable, opérationnel et cohérent."},
{id:10,cat:"Objectifs & Principes",type:"mcq",q:"Lequel NE fait PAS partie des 5 principes de reporting du BC® ?",o:["Exactitude","Significativité","Compensabilité","Transparence"],a:2,e:"Les 5 principes de reporting : Cohérence, Exactitude, Significativité, Évaluation, Transparence. La 'Compensabilité' n'en fait pas partie — le BC® est orienté RÉDUCTION des émissions."},
{id:11,cat:"Objectifs & Principes",type:"mcq",q:"Lequel NE fait PAS partie des 4 principes d'analyse stratégique du BC® ?",o:["Stratégie bas carbone","Anticipation","Rentabilité financière","Pragmatisme"],a:2,e:"Les 4 principes d'analyse stratégique : Stratégie bas carbone, Vision long terme, Anticipation, Pragmatisme. La 'Rentabilité financière' n'est pas un principe de la méthode."},
{id:12,cat:"Objectifs & Principes",type:"mcq",q:"Le BC® niveau Avancé couvre les exigences CSRD ESRS E1 à hauteur de :",o:["L'intégralité","La majeure partie","La moitié environ","Il n'est pas compatible CSRD"],a:1,e:"Le BC® niveau Avancé couvre LA MAJEURE PARTIE (pas l'intégralité) de la CSRD ESRS E1. Les niveaux Initial et Standard ont une couverture partielle. Cette compatibilité est un atout : un seul BC® peut alimenter plusieurs référentiels."},
{id:13,cat:"Objectifs & Principes",type:"mcq",q:"Le BC® mesure-t-il la responsabilité climatique d'une organisation ?",o:["Oui, c'est son objectif principal","Non — il identifie le potentiel d'action pour dimensionner le plan de transition","Oui, mais uniquement pour les émissions directes","Non, c'est réservé aux États"],a:1,e:"Le BC® ne mesure PAS la responsabilité climatique. Il identifie le POTENTIEL D'ACTION pour dimensionner le plan de transition. L'objectif : transformer l'organisation pour l'adapter au monde bas carbone de demain."},
{id:14,cat:"Les 7 Étapes",type:"mcq",q:"Combien d'étapes compte la démarche Bilan Carbone® v9 ?",o:["5","6","7","8"],a:2,e:"7 étapes : (1) Cadrage, (2) Périmètre, (3) Mobilisation, (4) Comptabilisation, (5) Plan de transition, (6) Synthèse et restitution, (7) Évaluation. La v9 est une démarche complète de transition bas carbone, pas seulement une méthode de calcul."},
{id:15,cat:"Les 7 Étapes",type:"mcq",q:"Quelle étape a remplacé la 'sensibilisation des acteurs' dans la v9 ?",o:["La communication externe","La mobilisation des acteurs","La formation obligatoire","Le reporting réglementaire"],a:1,e:"La 'sensibilisation' laisse place à la 'MOBILISATION'. Ce changement est intentionnel : mettre en MOUVEMENT et en ACTION les organisations. La mobilisation est transversale à toutes les étapes, pas seulement ponctuelle."},
{id:16,cat:"Les 7 Étapes",type:"mcq",q:"Quelles actions font partie de l'étape de cadrage (étape 1) ?",o:["Calculer les émissions GES et sélectionner les FE","Mobiliser la Direction, nommer un·e coordinateur·rice, structurer la gouvernance","Rédiger le rapport final et le publier sur l'OCCF","Définir les objectifs de réduction à 2030"],a:1,e:"Cadrage (étape 1) : mobiliser la Direction, nommer un·e coordinateur·rice interne, structurer la gouvernance (comité de pilotage, équipe projet), définir le niveau de maturité visé. Calcul des émissions = étape 4. Objectifs = étape 5. Publication = étape 6."},
{id:17,cat:"Les 7 Étapes",type:"mcq",q:"La mobilisation dans le Bilan Carbone® intervient :",o:["Uniquement au début (cadrage)","Uniquement lors de la restitution finale","De façon transversale tout au long de la démarche","Uniquement auprès de l'équipe projet"],a:2,e:"La mobilisation est TRANSVERSALE : elle intervient à chaque étape (cadrage, périmètre, comptabilisation, plan de transition, restitution). La v9 exige une mobilisation EN CONTINU. Elle concerne les PP internes ET externes."},
{id:18,cat:"Niveaux de Maturité",type:"mcq",q:"Quels sont les 3 niveaux de maturité introduits dans la v9 ?",o:["Bronze, Argent, Or","Débutant, Intermédiaire, Expert","Initial, Standard, Avancé","Basique, Confirmé, Certifié"],a:2,e:"La v9 introduit : INITIAL (premier bilan ou org. peu mature), STANDARD (démarche régulière avec plan d'action structuré), AVANCÉ (pilotage stratégique complet intégré à la stratégie globale)."},
{id:19,cat:"Niveaux de Maturité",type:"mcq",q:"À quelle fréquence minimale le BC® niveau Avancé doit-il être renouvelé ?",o:["Tous les 4 ans","Tous les 3 ans","Tous les 2 ans","Tous les ans"],a:3,e:"Fréquences : Initial → max 4 ans. Standard → 2 ans. Avancé → TOUS LES ANS. La fréquence croissante traduit l'ambition : au niveau Avancé, le BC® est un véritable outil de pilotage stratégique annuel."},
{id:20,cat:"Niveaux de Maturité",type:"mcq",q:"Une entreprise réalise son BC® tous les 2 ans. Peut-elle se positionner en niveau Avancé ?",o:["Oui, si elle respecte tous les autres critères","Non — le niveau Avancé exige un renouvellement annuel","Oui, la fréquence n'est pas un critère","Oui, si son bilan a été évalué par un tiers"],a:1,e:"NON. Tous les 2 ans = niveau STANDARD. Le niveau Avancé exige un renouvellement ANNUEL. La fréquence est bien un critère discriminant entre les niveaux."},
{id:21,cat:"Niveaux de Maturité",type:"mcq",q:"Pour le niveau Initial, quel % minimal des émissions indirectes doit être couvert ?",o:["60%","70%","80%","100%"],a:2,e:"Niveau Initial : 100% des émissions directes + entre 80% et 100% des émissions indirectes. Le seuil de 80% est aligné avec le BEGES-R et ISO 14064-1. 70% est INSUFFISANT."},
{id:22,cat:"Niveaux de Maturité",type:"mcq",q:"Au niveau Standard, comment les objectifs de réduction sont-ils exprimés ?",o:["En valeur absolue uniquement","En intensité relative uniquement","En valeur absolue ET en intensité relative","Aucune exigence de forme"],a:2,e:"Standard : objectifs en VALEUR ABSOLUE (ex : -30% tCO₂e d'ici 2030) ET en INTENSITÉ RELATIVE (ex : -20% tCO₂e/€CA). Initial = valeur absolue uniquement."},
{id:23,cat:"Niveaux de Maturité",type:"mcq",q:"À partir de quel niveau la coconstruction devient-elle obligatoire ?",o:["Initial","Standard","Avancé","Elle n'est jamais obligatoire"],a:1,e:"La COCONSTRUCTION est obligatoire à partir du niveau STANDARD. Au niveau Initial, la mobilisation peut se limiter à 3 temps (lancement, collecte, restitution) sans coconstruction obligatoire."},
{id:24,cat:"Niveaux de Maturité",type:"mcq",q:"Au niveau Avancé, quelle exigence s'applique à la direction ?",o:["Aucune exigence particulière","Valider uniquement les données chiffrées","Être informée du lancement","Au moins 1 membre doit être porteur ET formé BC® Décideurs"],a:3,e:"Niveau Avancé : au moins 1 MEMBRE DE LA DIRECTION doit être porteur de la démarche ET avoir suivi la formation BC® Décideurs. Cela traduit l'intégration du BC® à la stratégie globale."},
{id:25,cat:"Niveaux de Maturité",type:"mcq",q:"L'Approbateur dans la démarche BC® est :",o:["Le consultant externe","La personne interne responsable de la mission qui s'assure que les objectifs sont atteints","L'évaluateur tiers","Le dirigeant qui signe le rapport"],a:1,e:"L'Approbateur est INTERNE à l'organisation, responsable de la mission, s'assurant que les objectifs sont atteints. À distinguer du coordinateur (pilote opérationnel), du consultant externe et de l'évaluateur tiers (auditeur)."},
{id:26,cat:"Niveaux de Maturité",type:"mcq",q:"Une organisation respecte tous les critères Avancés sauf A3. Peut-elle se positionner Avancé ?",o:["Non, tous les critères sont absolument obligatoires","Oui — un seul critère manquant est toléré","Uniquement si A3 est compensé par d'autres critères","Non, elle doit se positionner en Initial"],a:1,e:"OUI, un seul critère manquant est toléré au niveau Avancé. Cela reflète la logique d'amélioration continue : progresser, pas atteindre la perfection absolue. Le critère manquant doit être documenté."},
{id:27,cat:"Niveaux de Maturité",type:"mcq",q:"En niveau Initial, l'organisation peut-elle se limiter à 3 temps de mobilisation ?",o:["Non, il en faut au minimum 5","Oui — 3 temps suffisent au niveau Initial","Non, sans nombre minimal mais mobilisation continue","Oui, uniquement si le budget est limité"],a:1,e:"OUI, au niveau Initial : 3 temps de mobilisation suffisent — (1) Lancement, (2) Présentation en cours de collecte, (3) Restitution finale. Aux niveaux Standard et Avancé, des phases supplémentaires (notamment coconstruction) sont exigées."},
{id:28,cat:"Niveaux de Maturité",type:"mcq",q:"Au niveau Initial, les objectifs de réduction doivent être :",o:["Uniquement court terme, sans référence nationale","Moyen ET long terme (2030 et 2050), valeur absolue, cohérents avec la SNBC","En intensité relative, selon des standards sectoriels","Librement définis sans contrainte"],a:1,e:"Niveau Initial : objectifs MOYEN TERME (ex : 2030) ET LONG TERME (ex : 2050), en VALEUR ABSOLUE, cohérents avec la SNBC. L'intensité relative et les standards sectoriels internationaux sont des exigences des niveaux supérieurs."},
{id:29,cat:"Cadrage",type:"mcq",q:"Qu'est-ce que l'outil RACI dans le pilotage d'un BC® ?",o:["Un outil de calcul des émissions par poste","Un outil pour structurer et clarifier les rôles et responsabilités des parties prenantes","Un référentiel de certification","Un système de notation de la qualité des données"],a:1,e:"RACI = Responsible (réalise), Accountable (approuve), Consulted (consulté), Informed (informé). C'est un outil de GOUVERNANCE de projet, pas de calcul carbone. Il aide à clarifier qui fait quoi dans la démarche BC®."},
{id:30,cat:"Cadrage",type:"mcq",q:"Une organisation peut-elle viser directement le niveau Avancé sans commencer par l'Initial ?",o:["Non, obligatoirement par l'Initial","Oui, elle peut viser le niveau correspondant à ses objectifs et maturité","Oui, mais uniquement si elle a déjà réalisé un BEGES","Non, les niveaux doivent être atteints séquentiellement"],a:1,e:"OUI, l'organisation peut viser directement le niveau correspondant à ses objectifs et maturité. Elle doit ensuite PROGRESSER à chaque itération. Le questionnaire de maturité aide à trouver le bon point de départ."},
{id:31,cat:"Cadrage",type:"mcq",q:"Qu'est-ce qu'une démarche Bilan Carbone® collective ?",o:["Un bilan réalisé par plusieurs personnes d'une même organisation","Plusieurs organisations s'associent pour réaliser chacune LEUR bilan en mutualisant ressources et pratiques","Un bilan pour un territoire et ses organisations","Une démarche imposée par une fédération à ses membres"],a:1,e:"La démarche collective = plusieurs ORGANISATIONS distinctes s'associent pour réaliser chacune son PROPRE BC®. Utile pour des organisations d'un même secteur ou territoire. Chaque organisation garde SON bilan individuel."},
{id:32,cat:"Cadrage",type:"mcq",q:"Quels sont les livrables attendus à l'issue de l'étape 1 (Cadrage) ?",o:["Le profil GES complet et la cartographie des flux","Description de l'org. (SIRET/SIREN/NAF/ETP), niveau de maturité, présentation du coordinateur et de l'équipe projet","Le plan de transition et les fiches actions","Les facteurs d'émission sélectionnés"],a:1,e:"Livrables cadrage (étape 1) : description de l'organisation (raison sociale, SIRET, SIREN, code NAF, ETP), présentation du coordinateur·ice et réalisateur (n° de formé + date de formation), niveau de maturité choisi."},
{id:33,cat:"Périmètre",type:"mcq",q:"Quels sont les 4 éléments constitutifs du périmètre d'un BC® ?",o:["Stratégique, financier, opérationnel, réglementaire","Émissions comptabilisées, périmètre organisationnel, périmètre temporel, périmètre opérationnel","Scope 1, 2, 3, 4","Amont, aval, direct, indirect"],a:1,e:"Les 4 périmètres : (1) ÉMISSIONS COMPTABILISÉES (quels GES ?), (2) PÉRIMÈTRE ORGANISATIONNEL (quelles entités ?), (3) PÉRIMÈTRE TEMPOREL (quelle période ?), (4) PÉRIMÈTRE OPÉRATIONNEL (quels postes d'émissions ?)."},
{id:34,cat:"Périmètre",type:"mcq",q:"Dans le périmètre organisationnel, que faut-il inclure à 100% quel que soit le niveau de maturité ?",o:["Toutes les émissions indirectes de la chaîne de valeur","100% des équipements et installations sous contrôle opérationnel de l'organisation","Uniquement les bâtiments propriété de l'organisation","Les filiales avec +50% du capital"],a:1,e:"Quel que soit le niveau de maturité, 100% des équipements et installations sous CONTRÔLE OPÉRATIONNEL (exploités et utilisés) doivent être inclus. Tout autre choix doit être justifié. Correspond à l'approche 'contrôle opérationnel' du BEGES-R et ISO 14064-1."},
{id:35,cat:"Périmètre",type:"mcq",q:"Quelle est la durée classique du périmètre temporel d'un BC® ?",o:["6 mois","1 an — pour refléter l'activité dans sa globalité","3 ans glissants","5 ans"],a:1,e:"Périmètre temporel CLASSIQUE = 1 AN. Un BC® peut couvrir une période particulière (événement, projet, chantier). Pour le reporting BEGES-R, le périmètre doit être d'une année complète."},
{id:36,cat:"Périmètre",type:"mcq",q:"Quels types de flux doivent être cartographiés dans un BC® ?",o:["Uniquement énergie et matières premières","Flux d'énergie, fluides, matières premières, personnes, produits (biens et services) et déchets","Uniquement flux financiers et énergie","Uniquement les flux entrants"],a:1,e:"TOUS les flux entrants, internes ET sortants : énergie, fluides, matières premières, personnes (déplacements), produits (biens achetés/vendus/sous-traités) et déchets. L'exhaustivité est clé : un flux oublié = des émissions non comptabilisées."},
{id:37,cat:"Périmètre",type:"mcq",q:"La cartographie des flux est obligatoire pour quel(s) niveau(x) ?",o:["Uniquement le niveau Avancé","Niveaux Standard et Avancé uniquement","Tous les niveaux : Initial, Standard et Avancé","Elle est toujours optionnelle"],a:2,e:"La cartographie des flux est exigée pour LES TROIS niveaux (critères F1, F2, F3). Seule la cartographie QUANTIFIÉE (avec valeurs chiffrées des émissions) est optionnelle — recommandée pour Standard et Avancé."},
{id:38,cat:"Périmètre",type:"mcq",q:"Quelle est la bonne séquence pour élaborer la cartographie des flux ?",o:["Préciser les données d'activité → Cartographier → Schématiser → Finaliser","Calculer les émissions → Cartographier → Définir le périmètre → Finaliser","Schématiser l'organigramme → Cartographier les flux → Préciser les données d'activité → Finaliser","Finaliser → Cartographier → Schématiser → Préciser les données"],a:2,e:"Séquence : (1) Schématiser l'organigramme → périmètre ORGANISATIONNEL. (2) Cartographier les flux → périmètre OPÉRATIONNEL. (3) Préciser les données d'activité → prépare la COLLECTE. (4) Finaliser. Processus ITÉRATIF."},
{id:39,cat:"Périmètre",type:"mcq",q:"Quelles sont les 2 grandes catégories de risques liés au changement climatique ?",o:["Risques financiers et risques opérationnels","Risques de transition et risques physiques","Risques réglementaires et risques technologiques","Risques court terme et risques long terme"],a:1,e:"(1) RISQUES DE TRANSITION — liés aux évolutions des sociétés et modèles éco (réglementaires, d'image, de marché, économiques). (2) RISQUES PHYSIQUES — directement liés à la modification du climat (événements extrêmes, changements progressifs). Identification exigée dès le niveau Initial."},
{id:40,cat:"Périmètre",type:"mcq",q:"Combien de critères de significativité permettent d'identifier les émissions indirectes prioritaires ?",o:["3","4","5","6"],a:3,e:"6 critères : (1) Ampleur/importance quantitative, (2) Influence et leviers d'action, (3) Importance stratégique et vulnérabilité, (4) Lignes directrices du secteur, (5) Sous-traitance (activités externalisées), (6) Engagement du personnel."},
{id:41,cat:"Périmètre",type:"mcq",q:"Qu'est-ce que la 'double matérialité' requise au niveau Avancé ?",o:["Comptabiliser émissions directes ET indirectes simultanément","Mesurer l'impact de l'org. sur l'environnement ET l'incidence de la dégradation de l'environnement sur l'org.","Réaliser deux bilans par an pour croiser les résultats","Appliquer deux méthodes pour valider"],a:1,e:"Double matérialité = analyser dans les 2 sens : (1) L'impact de l'org. sur l'environnement (matérialité d'impact), (2) L'incidence de la dégradation de l'environnement sur l'org. (matérialité financière). Aligné avec la CSRD."},
{id:42,cat:"Mobilisation",type:"mcq",q:"Quelles sont les 4 phases de mobilisation définies par la méthode BC® ?",o:["Communication, Formation, Action, Évaluation","Sensibilisation/vulgarisation, Responsabilisation, Coconstruction, Restitution/communication","Diagnostic, Planification, Mise en œuvre, Bilan","Interne, Externe, Hiérarchique, Opérationnelle"],a:1,e:"Les 4 phases : (1) SENSIBILISATION/VULGARISATION — comprendre pour agir. (2) RESPONSABILISATION — donner un rôle à chacun. (3) COCONSTRUCTION — co-bâtir le plan d'action avec les PP. (4) RESTITUTION ET COMMUNICATION — permettre l'appropriation des résultats."},
{id:43,cat:"Mobilisation",type:"mcq",q:"À quelle étape de la démarche BC® la coconstruction du plan de transition est-elle réalisée ?",o:["Étape 1 — Cadrage","Étape 2 — Périmètre","Étape 4 — Comptabilisation","Étape 5 — Plan de transition"],a:3,e:"Calendrier : Étape 1 → sensibilisation. Étape 2 → responsabilisation des détenteurs de données. Étape 4 → restitution intermédiaire. Étape 5 (Plan de transition) → COCONSTRUCTION des actions. Étape 6 → communication finale."},
{id:44,cat:"Mobilisation",type:"mcq",q:"Quelles sont les 6 catégories de parties prenantes à mobiliser dans un BC® ?",o:["Direction, RH, Finance, Production, Commercial, Juridique","Équipe projet, Direction, Collaborateurs internes, Fournisseurs, Clients, Autres partenaires externes","Actionnaires, Salariés, Clients, État, Banques, Médias","Équipe carbone, RSE, qualité, achats, communication, direction"],a:1,e:"Les 6 catégories : (1) Équipe projet/porteurs internes, (2) Direction, (3) Collaborateurs internes (employés, bénévoles), (4) PP externes AMONT (fournisseurs), (5) PP externes AVAL (clients), (6) Autres partenaires externes (financiers, techniques, acteurs locaux, fédérations)."},
{id:45,cat:"Mobilisation",type:"mcq",q:"Combien de phases de mobilisation distinctes la méthode prévoit-elle (sous-étapes 3.1.1 à ...) ?",o:["3 phases","4 phases","5 phases","6 phases"],a:2,e:"5 phases de mobilisation (3.1.1 à 3.1.5) : (3.1.1) Au lancement/cadrage, (3.1.2) Au lancement de la collecte, (3.1.3) À l'issue du profil GES, (3.1.4) Pour la construction du plan de transition, (3.1.5) En synthèse de la démarche. Timing indicatif."},
{id:46,cat:"Mobilisation",type:"mcq",q:"Sur les formats et outils de mobilisation, que prévoit la méthode ?",o:["Elle impose des formats et outils spécifiques","Elle exige le contenu et les messages, mais laisse libre le choix des formats et outils","Elle n'impose aucune exigence de contenu","Elle recommande uniquement des présentations PowerPoint"],a:1,e:"La méthode exige le CONTENU et les MESSAGES nécessaires pour passer à l'action. En revanche, les MOYENS (formats, outils) restent à l'appréciation du pilote de la démarche."},
{id:47,cat:"Comptabilisation",type:"mcq",q:"Quelle est la formule de base du calcul des émissions d'une source ?",o:["Émissions = Données d'activité ÷ Facteur d'émission","Émissions = Données d'activité × Facteur d'émission ± Incertitude","Émissions = Facteur d'émission × Surface × Durée","Émissions = Données d'activité + Facteur d'émission − Compensation"],a:1,e:"Formule fondamentale : DA × FE = Résultat ± Incertitude. La DONNÉE D'ACTIVITÉ est la quantité physique mesurée (litres, km, tonnes…). Le FACTEUR D'ÉMISSION convertit en tCO₂e. L'INCERTITUDE est toujours associée."},
{id:48,cat:"Comptabilisation",type:"mcq",q:"Quelle est l'unité standard pour exprimer les émissions de GES dans un BC® ?",o:["Tonnes de CO₂ (tCO₂)","Tonne CO₂ équivalent (tCO₂e)","Kilogrammes de carbone (kgC)","Tonnes d'équivalent pétrole (tep)"],a:1,e:"L'unité est la TONNE CO₂ ÉQUIVALENT (tCO₂e). Elle agrège différents GES aux pouvoirs de réchauffement très différents. tCO₂ sans 'e' = uniquement le CO₂ — ce n'est pas l'unité standard du BC®."},
{id:49,cat:"Comptabilisation",type:"mcq",q:"Quel indicateur permet de convertir les différents GES en tCO₂e ?",o:["Le potentiel d'acidification (PA)","Le pouvoir de réchauffement global à 100 ans (PRG-100)","L'indice de réchauffement climatique (IRC)","Le facteur de conversion carbone (FCC)"],a:1,e:"Le PRG-100 mesure le forçage radiatif d'un GES vs CO₂ sur 100 ans. Exemples : CH₄ ≈ 28, N₂O ≈ 265, SF₆ ≈ 23 900. Valeurs mises à jour régulièrement par le GIEC."},
{id:50,cat:"Comptabilisation",type:"mcq",q:"Quels gaz doivent OBLIGATOIREMENT être comptabilisés dans un BC® ?",o:["CO₂ et CH₄ uniquement","CO₂, CH₄, N₂O, SF₆, HFC, PFC et NF₃","CO₂, CH₄, N₂O et SO₂","Tous les gaz polluants atmosphériques"],a:1,e:"Gaz obligatoires : CO₂, CH₄, N₂O, SF₆, HFC, PFC et NF₃. Le NF₃ n'est pas dans le Protocole de Kyoto mais le BC® l'inclut. Le SO₂ est un polluant (pluies acides) mais PAS un GES au sens du BC®."},
{id:51,cat:"Comptabilisation",type:"mcq",q:"Qu'est-ce que le 'profil d'émission' (ou profil GES) dans un BC® ?",o:["Le résumé des objectifs de réduction","La répartition des émissions quantifiées sur les différents postes du BC®","La liste des facteurs d'émission utilisés","Le classement des émissions par niveau d'incertitude"],a:1,e:"Le PROFIL D'ÉMISSION = répartition des émissions quantifiées sur les postes BC®. C'est LE livrable central de l'étape 4. Il doit inclure les incertitudes et le taux de ratios monétaires. C'est ce profil ANONYMISÉ qui est déposé sur l'OCCF."},
{id:52,cat:"Comptabilisation",type:"mcq",q:"La comptabilité carbone est-elle une mesure scientifiquement rigoureuse ?",o:["Oui, si les bonnes méthodes sont appliquées","Non — c'est un calcul basé sur la science, incertain par nature mais suffisant pour agir","Oui, uniquement pour les émissions directes mesurées par capteurs","Non, c'est uniquement une estimation politique"],a:1,e:"La comptabilité carbone N'EST PAS une mesure mais un CALCUL. Elle est 'basée sur la science', pas rigoureusement scientifique. Incertaine par nature — mais suffisante pour PASSER À L'ACTION et réduire les émissions."},
{id:53,cat:"Comptabilisation",type:"mcq",q:"Quelle est la différence entre une 'source d'émission' et un 'poste d'émissions' ?",o:["Aucune différence, synonymes","Source = unité physique/processus émettant des GES ; poste = regroupement de plusieurs sources homogènes","Source = obligatoirement comptabilisée ; poste = optionnel","Source = émissions directes ; poste = émissions indirectes"],a:1,e:"SOURCE D'ÉMISSION = unité physique ou processus rejetant des GES (ex : un véhicule, une chaudière). POSTE D'ÉMISSIONS = regroupement de plusieurs sources homogènes (ex : 'déplacements domicile-travail'). GHG Protocol parle de 'scopes' et 'catégories'."},
{id:54,cat:"Comptabilisation",type:"mcq",q:"Quelle base de données de facteurs d'émission est la référence nationale française ?",o:["IPCC Database","Base Carbone® de l'ADEME","GHG Protocol Database","Ecoinvent"],a:1,e:"La BASE CARBONE® de l'ADEME est la référence nationale française pour les facteurs d'émission. Accessible gratuitement en ligne. En l'absence de FE dans la Base Carbone®, d'autres sources peuvent être utilisées — à condition de les documenter."},
{id:55,cat:"Comptabilisation",type:"mcq",q:"Quels sont les livrables attendus à l'issue de l'étape 4 (Comptabilisation) ?",o:["Le plan d'action et les fiches actions","Matrice de collecte, FE documentés, incertitudes, taux de ratios monétaires, et profil GES","Cartographie des flux et liste des risques","Rapport d'évaluation externe"],a:1,e:"Livrables étape 4 : (1) MATRICE DE COLLECTE (données + description du processus), (2) FACTEURS D'ÉMISSION documentés (spécifiques et ratios monétaires + sources), (3) INCERTITUDES, (4) TAUX DE RATIOS MONÉTAIRES, (5) PROFIL GES en tCO₂e. Ce dernier est le livrable central."},
{id:56,cat:"Plan de Transition",type:"mcq",q:"Le plan de transition dans la v9 est :",o:["Optionnel pour tous les niveaux","Obligatoire et au cœur de la méthode, avec des exigences adaptées à chaque niveau","Obligatoire uniquement pour le niveau Avancé","Un simple document de communication sans indicateurs"],a:1,e:"Le plan de transition est OBLIGATOIRE À TOUS LES NIVEAUX et au cœur de la v9. Sans plan de transition, un BC® est INCOMPLET. La v9 est plus exigeante sur son existence, mais l'adapte aux 3 niveaux de maturité."},
{id:57,cat:"Plan de Transition",type:"mcq",q:"Quels sont les 3 éléments obligatoires d'un plan de transition BC® ?",o:["Un budget, un responsable RSE, et une date de clôture","Des objectifs de réduction, une série d'actions détaillées et quantifiées, et une trajectoire crédible","Une certification externe, des KPI financiers, et un rapport annuel","Une analyse concurrentielle, des benchmarks sectoriels, et des projections financières"],a:1,e:"Plan de transition = (1) OBJECTIFS DE RÉDUCTION alignés sur les scénarios climatiques, (2) ACTIONS détaillées, quantifiées, avec responsables, (3) TRAJECTOIRE crédible par rapport aux actions et objectifs. Des INDICATEURS de suivi permettent le pilotage."},
{id:58,cat:"Plan de Transition",type:"mcq",q:"Quels sont les 4 adjectifs qualifiant le plan de transition attendu par le BC® ?",o:["Chiffré, publié, certifié, exhaustif","Ambitieux, pilotable, opérationnel, cohérent avec la comptabilisation","Conforme, audité, transparent, international","Court terme, long terme, stratégique, financier"],a:1,e:"Le plan de transition doit être : (1) AMBITIEUX — aligné sur les objectifs climatiques, (2) PILOTABLE — avec des indicateurs de suivi, (3) OPÉRATIONNEL — actions concrètes avec responsables, (4) COHÉRENT avec la comptabilisation — les actions ciblent les postes d'émissions identifiés dans le bilan."},
{id:59,cat:"Plan de Transition",type:"mcq",q:"Les actions d'adaptation au changement climatique doivent-elles faire partie du plan de transition ?",o:["Non, uniquement la réduction des émissions (atténuation)","Oui — le plan intègre des actions d'adaptation aux risques physiques et de transition","Uniquement pour le secteur agricole","Oui, mais uniquement au niveau Avancé"],a:1,e:"OUI, le plan de transition BC® doit intégrer des actions d'ADAPTATION (pas seulement de réduction/atténuation). Les risques identifiés en étape 2.5 doivent se traduire en actions concrètes. Au niveau Avancé, des objectifs d'adaptation EXPLICITES sont requis."},
{id:60,cat:"Plan de Transition",type:"mcq",q:"Quels sont les livrables attendus à l'issue de l'étape 5 (Plan de transition) ?",o:["Le profil GES final et les incertitudes","Objectifs, fiches actions, trajectoire, et indicateurs de suivi/mise en œuvre/performance","Le rapport d'évaluation externe","La cartographie des risques et opportunités mise à jour"],a:1,e:"Livrables étape 5 : (1) OBJECTIFS du plan de transition, (2) PLAN D'ACTION via les fiches actions, (3) TRAJECTOIRE de décarbonation, (4) INDICATEURS — de suivi (pilotage), de mise en œuvre (avancement) et de performance (résultats)."},
{id:61,cat:"Synthèse & Restitution",type:"mcq",q:"En combien d'étapes se déroule la restitution d'un Bilan Carbone® ?",o:["1 étape","2 à 3 étapes","4 étapes","5 étapes"],a:1,e:"Restitution en 2 à 3 étapes : (1) RESTITUTION INTERNE — par le pilote, avec tous les livrables BC® archivés, (2) RESTITUTION ET PUBLICATION — dépôt anonyme du profil GES sur l'OCCF + publication externe optionnelle, (3) RESTITUTION AVEC ÉVALUATION VOLONTAIRE — si l'org. fait auditer son bilan par un évaluateur indépendant."},
{id:62,cat:"Synthèse & Restitution",type:"mcq",q:"Qu'est-ce que l'OCCF et quel rôle joue-t-il ?",o:["L'Organisme de Certification Carbone Français — délivre les labels BC®","L'Observatoire de la Comptabilité Carbone en France — le profil GES anonymisé y est déposé obligatoirement","L'Office de Contrôle Carbon Footprint — audite tous les bilans","L'Outil de Calcul Carbone Français — base de données des FE"],a:1,e:"L'OCCF = plateforme où chaque organisation DOIT déposer son profil GES ANONYMISÉ. Ce dépôt contribue à la connaissance publique sur les émissions sectorielles. C'est une exigence du principe de TRANSPARENCE du BC®."},
{id:63,cat:"Synthèse & Restitution",type:"mcq",q:"Quels sont les 2 objectifs de l'évaluation (étape 7) ?",o:["Calculer le coût du bilan et préparer le prochain","Vérifier que le bilan respecte les exigences BC® et confirmer le niveau de maturité","Communiquer en externe et obtenir un label RSE","Comparer avec les bilans des concurrents"],a:1,e:"L'évaluation (étape 7, facultative) : (1) VÉRIFIER que le bilan respecte les exigences méthodologiques BC®, (2) CONFIRMER le niveau de maturité — utile pour savoir quelle démarche complémentaire (ACT, SBTi…) peut être amorcée ensuite."},
{id:64,cat:"Synthèse & Restitution",type:"mcq",q:"L'évaluation (audit) d'un Bilan Carbone® est-elle obligatoire ?",o:["Oui, pour tous les niveaux","Oui, uniquement pour le niveau Avancé","Non — facultative, mais le BC® doit pouvoir être évalué à tout moment","Non, réservée aux organisations de +500 salariés"],a:2,e:"L'évaluation (étape 7) est FACULTATIVE mais le BC® doit être structuré pour POUVOIR ÊTRE ÉVALUÉ à tout moment. Elle peut être demandée pour : conformité réglementaire, assurance sur la fiabilité, contrôle qualité de bilans de PP, transparence de la communication."},
{id:65,cat:"Synthèse & Restitution",type:"mcq",q:"Les 3 piliers A, B, C de l'action climatique peuvent-ils être combinés pour calculer une 'empreinte nette' ?",o:["Oui — empreinte nette = émissions induites – évitées – séquestrées","Non — les 3 piliers sont strictement NON COMBINABLES","Oui, mais uniquement B et C peuvent se soustraire à A","Oui, si l'org. est Avancée et les 3 piliers ont été audités"],a:1,e:"Les 3 piliers sont STRICTEMENT NON COMBINABLES : ni additionnables, ni soustrayables. Pilier A (émissions induites) = BC® les réduit. Piliers B (émissions évitées) et C (séquestration) = calculables séparément mais ne se soustraient pas du Pilier A."},
{id:66,cat:"Synthèse & Restitution",type:"mcq",q:"Avec quels référentiels le Bilan Carbone® est-il compatible ?",o:["Uniquement ISO 14001 et EMAS","ISO 14064-1, GHG Protocol, BEGES réglementaire français, et CSRD ESRS E1","GHG Protocol uniquement","Aucun — le BC® est un standard autonome"],a:1,e:"Le BC® est compatible avec : ISO 14064-1-2:2019, le GHG Protocol, le BEGES réglementaire français, et la CSRD ESRS E1 (niveau Avancé). Il est aussi utilisable pour NZI, ACT, SBTi. Un seul BC® peut alimenter plusieurs référentiels simultanément."},
{id:67,cat:"Synthèse & Restitution",type:"mcq",q:"Que signifie 'Bilan Carbone® évalué' pour une organisation ?",o:["L'organisation a simplement déposé son profil GES sur l'OCCF","L'organisation a fait auditer son bilan par un évaluateur indépendant avec un résultat positif","L'organisation a atteint le niveau Avancé de maturité","L'organisation a obtenu la certification ISO 14064-1"],a:1,e:"Un 'BC® évalué' signifie que l'organisation a fait AUDITER son bilan par des évaluateurs INDÉPENDANTS avec un résultat POSITIF. Suit le processus du Guide d'évaluation (bilancarbone-evaluation.com). Un simple dépôt OCCF ne suffit pas."},
// ── NOUVELLES QUESTIONS MCQ — enrichissement depuis sources officielles ────────
// Chapitre 1 — Cadrage
{id:68,cat:"Cadrage",type:"mcq",q:"Quelle méthode est recommandée par la méthode BC® pour structurer les rôles et responsabilités au sein de l'équipe projet ?",o:["La méthode SWOT","La méthode RACI","La méthode OKR","La méthode PDCA"],a:1,e:"La méthode RACI (Responsible, Accountable, Consulted, Informed) est recommandée pour 'structurer et clarifier les rôles et responsabilités' au sein du pilotage du BC®."},
{id:69,cat:"Cadrage",type:"mcq",q:"Au niveau de maturité Initial, qui peut réaliser la démarche Bilan Carbone® ?",o:["Uniquement un bureau d'études externe","Un coordinateur pilote unique formé en interne, avec possibilité d'un prestataire externe optionnel","Obligatoirement une équipe de 3 personnes minimum","Uniquement un évaluateur certifié ABC"],a:1,e:"Au niveau Initial, un coordinateur (pilote unique) formé en interne suffit. Un bureau d'études spécialisé peut intervenir en appui optionnel. Les exigences de pilotage augmentent avec les niveaux Standard et Avancé."},
{id:70,cat:"Cadrage",type:"mcq",q:"Au niveau de maturité Avancé, quelle implication de la direction est requise ?",o:["La direction peut être simplement informée","Au moins un membre de la direction doit être porteur et garant de l'application du plan de transition","La direction n'est pas concernée par la démarche","La direction doit signer le rapport d'évaluation externe"],a:1,e:"Au niveau Avancé, 'l'implication hiérarchique et la gouvernance du sujet carbone sont des priorités' : au moins un membre de la direction doit être porteur de la démarche et garant de l'application du plan de transition."},
{id:71,cat:"Cadrage",type:"mcq",q:"À quelle fréquence minimale le Bilan Carbone® doit-il être renouvelé pour le secteur public (BEGES réglementaire) ?",o:["Tous les ans","Tous les 2 ans","Tous les 3 ans","Tous les 4 ans"],a:2,e:"Le renouvellement est à minima tous les 4 ans pour les niveaux Initial et Standard, SAUF pour les organisations de droit public soumises au BEGES-R qui doivent renouveler tous les 3 ans."},
{id:72,cat:"Cadrage",type:"mcq",q:"Quelle est la fréquence minimale de renouvellement du BC® au niveau de maturité Avancé ?",o:["Tous les 4 ans","Tous les 3 ans","Tous les 2 ans","Au moins tous les ans"],a:3,e:"Au niveau Avancé, 'le Bilan Carbone® complet de l'organisation est renouvelé à minima tous les ans'. Ce renouvellement annuel permet d'alimenter la stratégie bas-carbone et les indicateurs de pilotage continus."},
// Chapitre 2 — Périmètre
{id:73,cat:"Périmètre",type:"mcq",q:"Quelle est la règle principale pour le périmètre organisationnel d'un Bilan Carbone® ?",o:["Inclure au minimum 50% des entités du groupe","Intégrer 100% des équipements exploités sous contrôle opérationnel de l'organisation","Exclure les filiales étrangères","Limiter au seul siège social"],a:1,e:"Le critère de contrôle opérationnel s'applique : 100% des équipements exploités par l'organisation doivent être inclus. 'Tout autre choix doit être justifié.' Les filiales consolidées sont également concernées."},
{id:74,cat:"Périmètre",type:"mcq",q:"Que sont les 'trois piliers' de l'action climatique dans le Bilan Carbone® ?",o:["Pilier A : émissions évitées ; Pilier B : émissions induites ; Pilier C : émissions séquestrées","Pilier A : émissions induites ; Pilier B : émissions évitées ; Pilier C : émissions séquestrées","Pilier A : émissions directes ; Pilier B : émissions indirectes ; Pilier C : émissions compensées","Pilier A : Scope 1 ; Pilier B : Scope 2 ; Pilier C : Scope 3"],a:1,e:"Les 3 piliers : (A) Émissions INDUITES = émissions directes et indirectes à réduire — seul pilier traité par le BC®. (B) Émissions ÉVITÉES = réductions chez des tiers. (C) Émissions SÉQUESTRÉES = puits de carbone. Ils sont strictement non combinables."},
{id:75,cat:"Périmètre",type:"mcq",q:"Pour quel niveau de maturité la couverture des émissions indirectes peut-elle être limitée à 80-100% ?",o:["Niveau Standard","Niveau Avancé","Niveau Initial","Aucun — la couverture doit toujours être 100%"],a:2,e:"Au niveau Initial, un taux de couverture de 80 à 100% des émissions indirectes est toléré. Aux niveaux Standard et Avancé, 100% des émissions (significatives et non significatives) doivent être comptabilisées."},
{id:76,cat:"Périmètre",type:"mcq",q:"Quelle règle s'applique aux organisations soumises au BEGES réglementaire concernant leur périmètre organisationnel ?",o:["Le périmètre peut être librement défini par l'organisation","Le périmètre doit correspondre à la Personne Morale soumise à régulation (SIREN)","Seuls les sites français sont inclus","Le périmètre doit correspondre aux entités cotées en bourse"],a:1,e:"Pour le BEGES réglementaire, le périmètre organisationnel doit correspondre à la Personne Morale identifiée par son numéro SIREN. De même, pour la CSRD, il correspond à l'entité déclarante dans les états financiers."},
// Chapitre 3 — Mobilisation
{id:77,cat:"Mobilisation",type:"mcq",q:"À quel moment de la démarche Bilan Carbone® la mobilisation doit-elle être programmée ?",o:["Uniquement au lancement de la démarche","Uniquement lors de la restitution finale","En continu durant toute la démarche, de la phase de cadrage à la synthèse","Uniquement pendant la phase de collecte des données"],a:2,e:"Selon la source officielle : 'La mobilisation se poursuit en continu durant toute la démarche Bilan Carbone®'. Elle intervient à 5 moments clés : lancement/cadrage, avant la collecte, après le profil GES, pour le plan de transition, et en synthèse finale."},
{id:78,cat:"Mobilisation",type:"mcq",q:"Que prescrit la méthode Bilan Carbone® concernant les outils et formats de mobilisation ?",o:["Des outils numériques obligatoires","Des ateliers en présentiel exclusivement","Aucun outil ni format imposé — la méthode est souple","Un kit de communication standardisé fourni par l'ABC"],a:2,e:"La méthode 'se veut souple et n'impose ni moyens, ni outils ou formats spécifiques'. L'organisation choisit ses propres modalités de mobilisation, adaptées à son contexte et à ses parties prenantes, en s'inspirant des exemples disponibles en annexe."},
{id:79,cat:"Mobilisation",type:"mcq",q:"Quel est le rôle spécifique de la mobilisation lors de la phase de construction du plan de transition ?",o:["Informer passivement les salariés des résultats","Coconstruire les actions avec les parties prenantes","Obtenir la validation externe d'un auditeur","Publier les résultats sur l'OCCF"],a:1,e:"Lors de la construction du plan de transition, la mobilisation a un rôle de COCONSTRUCTION : les parties prenantes (internes et externes) sont associées à l'élaboration des actions, ce qui garantit l'adhésion et l'opérationnalité du plan."},
// Chapitre 4 — Comptabilisation
{id:80,cat:"Comptabilisation",type:"mcq",q:"Combien de postes et de sous-postes comporte la nomenclature du Bilan Carbone® v9 ?",o:["5 postes et 20 sous-postes","7 postes et 35 sous-postes","10 postes et 48 sous-postes","12 postes et 60 sous-postes"],a:2,e:"La nomenclature BC® v9 structure les émissions en 10 POSTES et 48 SOUS-POSTES. Chaque émission ne peut être comptabilisée que dans un seul sous-poste, évitant ainsi les doubles comptages."},
{id:81,cat:"Comptabilisation",type:"mcq",q:"Quelle est la limite maximale de facteurs d'émission en ratios monétaires au niveau de maturité Standard ?",o:["Max 10% de ratios monétaires spécifiques, max 30% de non-spécifiques","Max 20% de ratios monétaires spécifiques et max 10% de non-spécifiques","Max 30% de ratios monétaires, sans distinction","Aucune limite n'est fixée"],a:1,e:"Au niveau Standard : max 20% de FE en ratios monétaires spécifiques et max 10% de non-spécifiques. Au niveau Initial : max 30% via ratios monétaires. Au niveau Avancé : max 10% de spécifiques, zéro non-spécifique idéalement."},
{id:82,cat:"Comptabilisation",type:"mcq",q:"Pourquoi les facteurs d'émission en ratios monétaires sont-ils déconseillés ?",o:["Parce qu'ils sont interdits par la méthode BC®","Parce qu'ils sont sensibles à l'inflation et présentent de très fortes incertitudes","Parce qu'ils ne couvrent pas les émissions directes","Parce qu'ils nécessitent un logiciel spécialisé"],a:1,e:"Les FE en ratios monétaires (kgCO₂e/k€) présentent de 'très fortes incertitudes', sont 'sensibles à l'inflation', et ne permettent pas de suivre l'efficacité des politiques d'achats responsables. Ils restent tolérés dans certaines limites par niveau de maturité."},
{id:83,cat:"Comptabilisation",type:"mcq",q:"Quels sont les 4 types de données d'activité dans la méthode Bilan Carbone® ?",o:["Données réelles, extrapolées, statistiques et approchées","Données mesurées, calculées, estimées et théoriques","Données primaires, secondaires, tertiaires et résiduelles","Données internes, externes, sectorielles et réglementaires"],a:0,e:"Les 4 types de données d'activité : (1) RÉELLES (physiques ou comptables, les plus fiables), (2) EXTRAPOLÉES (questionnaires, ajustements), (3) STATISTIQUES (moyennes sectorielles, à limiter), (4) APPROCHÉES (à éviter, moins fiables). Plus le niveau de maturité est élevé, plus on utilise des données réelles."},
// Chapitre 5 — Plan de transition
{id:84,cat:"Plan de Transition",type:"mcq",q:"Quelle approche est recommandée pour définir les objectifs de réduction dans le plan de transition ?",o:["Bottom-up — à partir des actions identifiées","Top-down — à partir d'une trajectoire théorique de décarbonation","Benchmark — à partir des objectifs des concurrents","Inside-out — à partir des capacités internes disponibles"],a:1,e:"L'approche recommandée est TOP-DOWN : sélectionner d'abord une trajectoire théorique de décarbonation (SNBC, SBT), puis décliner les objectifs par horizon temporel (court terme = 3-4 ans, moyen terme = ~10 ans, long terme = 2050)."},
{id:85,cat:"Plan de Transition",type:"mcq",q:"Quelles sont les 5 catégories d'actions dans un plan de transition Bilan Carbone® ?",o:["Actions techniques, organisationnelles, comportementales, réglementaires et financières","Actions immédiates, prioritaires, stratégiques, d'amélioration et d'adaptation","Actions Scope 1, Scope 2, Scope 3, d'évitement et de compensation","Actions court terme, moyen terme, long terme, d'urgence et systémiques"],a:1,e:"Les 5 catégories d'actions : (1) IMMÉDIATES (court terme, sans difficultés majeures), (2) PRIORITAIRES (réduisent fortement les postes significatifs), (3) STRATÉGIQUES (moyen/long terme, modifient le modèle), (4) D'AMÉLIORATION (précisent la méthodologie), (5) D'ADAPTATION (résilience climatique)."},
{id:86,cat:"Plan de Transition",type:"mcq",q:"Parmi les 4 natures d'actions possibles dans un plan de transition, laquelle représente la pertinence maximale selon la méthode ?",o:["Les actions de compensation","Les actions hors chaîne de valeur","Les actions dans le cœur d'activité de l'organisation","Les actions d'évitement"],a:2,e:"La pertinence des actions se hiérarchise du plus au moins pertinent : (1) Actions dans le CŒUR D'ACTIVITÉ (pertinence maximale), (2) Dans la chaîne de valeur, (3) Hors chaîne de valeur, (4) D'évitement, (5) De compensation (pertinence minimale)."},
// Chapitre 6 — Restitution
{id:87,cat:"Synthèse & Restitution",type:"mcq",q:"Quels sont les trois résultats possibles d'une évaluation du Bilan Carbone® ?",o:["Validé, En cours, Refusé","Validation, Échec, Rejet","Certifié, Non certifié, En révision","Conforme, Partiellement conforme, Non conforme"],a:1,e:"Les 3 résultats possibles : (1) VALIDATION — 'le bilan est vérifié et validé', (2) ÉCHEC — 'l'évaluation n'a pas pu aboutir', (3) REJET — 'des éléments indiquent que le bilan n'est pas fondamentalement correct'. En cas de validation, l'ABC délivre une attestation avec le niveau de maturité."},
// Chapitre 7 — Évaluation
{id:88,cat:"Évaluation & Qualité",type:"mcq",q:"Quelles sont les 4 étapes du processus d'évaluation d'un Bilan Carbone® ?",o:["Candidature, Audit documentaire, Audit terrain, Certification","Recueil d'informations générales, Vérification des prérequis, Évaluation méthodologique, Analyse de cohérence et pertinence","Cadrage, Collecte, Analyse, Restitution","Autoévaluation, Évaluation externe, Délibération, Publication"],a:1,e:"Le processus d'évaluation comprend 4 étapes : (1) Recueil d'informations générales (traçabilité), (2) Vérification des prérequis (formation, outil, implication hiérarchique), (3) Évaluation méthodologique (respect de la méthode), (4) Analyse de cohérence et pertinence du bilan et du plan de transition."},
{id:89,cat:"Évaluation & Qualité",type:"mcq",q:"Quelle est la condition d'impartialité requise pour les évaluateurs d'un Bilan Carbone® ?",o:["L'évaluateur peut appartenir à la même organisation s'il est certifié","Les évaluateurs doivent être indépendants de ceux ayant réalisé le bilan","Seul un expert-comptable peut réaliser l'évaluation","L'évaluation doit être réalisée par l'ADEME"],a:1,e:"Les évaluateurs doivent respecter les principes d'impartialité et d'indépendance vis-à-vis de ceux ayant réalisé le bilan. Tous les membres doivent appartenir à des organisations adhérentes à l'ABC. Tout conflit d'intérêt doit être signalé à l'ABC."},
{id:90,cat:"Évaluation & Qualité",type:"mcq",q:"Quelle est la validité des plans d'action et trajectoires lors d'une évaluation du Bilan Carbone® ?",o:["1 an","2 ans","4 ans","10 ans"],a:1,e:"Les plans d'action et trajectoires ont une validité de 2 ANS lors d'une évaluation. L'analyse des risques au niveau Avancé a une validité de 10 ans. La démarche de mobilisation a une validité de 2 ans. Cela évite les redondances entre renouvellements."},
{id:91,cat:"Évaluation & Qualité",type:"mcq",q:"Pour quelle raison une organisation peut-elle demander une évaluation externe de son Bilan Carbone® ?",o:["Uniquement pour obtenir un label RSE","Pour la conformité réglementaire, l'assurance de fiabilité, le contrôle qualité ou la transparence de communication","Uniquement si elle est au niveau Avancé","Pour obtenir une réduction de sa taxe carbone"],a:1,e:"Une évaluation externe peut être demandée pour : (1) conformité réglementaire (BEGES-R, CSRD), (2) assurance sur la fiabilité des résultats, (3) contrôle qualité des bilans de parties prenantes, (4) transparence de la communication externe. Elle reste volontaire."},
// ── QUESTIONS CERTIFICATION NIVEAU 1 (issues de bilan-carbone-revision.html) ──
{id:92,cat:"Historique",type:"mcq",q:"Qui a développé la méthode Bilan Carbone® à partir de 2002 ?",o:["Jean-Marc Jancovici pour l'ADEME","L'ADEME seule, en 1997","Le GHG Protocol (WRI/WBCSD)","La Commission Européenne"],a:0,e:"Le Bilan Carbone® a été développé à partir de 2002 par Jean-Marc Jancovici (ingénieur, cofondateur Carbone 4) pour le compte de l'ADEME. Depuis 2011, la méthode est gérée par l'ABC (Association pour la transition Bas Carbone)."},
{id:93,cat:"Historique",type:"mcq",q:"Quelle organisation gère la marque Bilan Carbone® depuis 2011 ?",o:["L'ADEME","L'ABC (Association pour la transition Bas Carbone)","Le GHG Protocol","L'ISO"],a:1,e:"Depuis 2011, la méthode Bilan Carbone® est la propriété de l'ABC (Association pour la transition Bas Carbone). L'ADEME conserve la gestion de la Base Empreinte® (base de données de facteurs d'émission)."},
{id:94,cat:"Comptabilisation",type:"mcq",q:"Quel est le Potentiel de Réchauffement Global (PRG) du méthane (CH₄) sur 100 ans selon le 5ème rapport du GIEC (AR5) ?",o:["21","28","34","72"],a:1,e:"Selon le AR5 du GIEC (utilisé par la Base Empreinte® française), le PRG du CH₄ est de 28. Il était de 21 selon le AR4 et de 29,8 selon le AR6. En France, on utilise conventionnellement la valeur AR5."},
{id:95,cat:"Comptabilisation",type:"mcq",q:"Lequel de ces gaz N'EST PAS inclus dans les 7 GES du Protocole de Kyoto comptabilisés dans le Bilan Carbone® ?",o:["SF₆ (hexafluorure de soufre)","NF₃ (trifluorure d'azote)","O₃ (ozone troposphérique)","HFC (hydrofluorocarbures)"],a:2,e:"L'ozone (O₃) n'est pas l'un des 7 GES du Protocole de Kyoto. Les 7 GES sont : CO₂, CH₄, N₂O, HFC, PFC, SF₆ et NF₃ (ce dernier ajouté en 2012). L'ozone est bien un GES mais n'est pas comptabilisé dans cette liste."},
{id:96,cat:"Périmètre",type:"mcq",q:"Dans le Bilan Carbone®, quel scope correspond aux émissions directes de l'organisation ?",o:["Scope 1","Scope 2","Scope 3","Scope 0"],a:0,e:"Le Scope 1 correspond aux émissions directes : combustion dans les installations et véhicules appartenant ou contrôlés par l'organisation, procédés industriels, émissions fugitives. Ce sont les sources que l'organisation possède ou contrôle directement."},
{id:97,cat:"Périmètre",type:"mcq",q:"L'électricité achetée sur le réseau par une entreprise appartient à quel scope ?",o:["Scope 1","Scope 2","Scope 3 amont","Scope 3 aval"],a:1,e:"L'électricité achetée sur le réseau est toujours en Scope 2. Ce scope regroupe les émissions indirectes liées à l'énergie achetée : électricité, chaleur, froid et vapeur. L'électricité autoproduite par des panneaux solaires propres serait en Scope 1."},
{id:98,cat:"Périmètre",type:"mcq",q:"Les déplacements domicile-travail des salariés appartiennent à quel scope ?",o:["Scope 1","Scope 2","Scope 3","Ils ne sont pas inclus dans le Bilan Carbone®"],a:2,e:"Les déplacements domicile-travail des salariés sont en Scope 3 (autres émissions indirectes). L'organisation ne contrôle pas ces déplacements mais en est indirectement responsable. Ce poste est inclus dès le niveau Initial."},
{id:99,cat:"Niveaux de Maturité",type:"mcq",q:"Quel niveau du Bilan Carbone® correspond au minimum réglementaire du BEGES (Bilan des Émissions de GES) ?",o:["Niveau Avancé","Niveau Initial","Niveau Standard","Niveau Basique"],a:2,e:"Le niveau Standard du Bilan Carbone® correspond au minimum réglementaire BEGES (Scopes 1 et 2 obligatoires). Le BEGES est imposé par l'article 75 de la loi Grenelle II (décret 2011-829) pour les entités dépassant certains seuils de salariés."},
{id:100,cat:"Comptabilisation",type:"mcq",q:"Quelle est l'unité de mesure utilisée dans le Bilan Carbone® ?",o:["kWh","kg de CO₂","teqCO₂ (tonnes équivalent CO₂)","Joules"],a:2,e:"L'unité du Bilan Carbone® est la teqCO₂ (tonne équivalent CO₂), parfois notée tCO₂e. Elle permet d'agréger les 7 GES en les convertissant via leur Potentiel de Réchauffement Global (PRG) sur 100 ans."},
{id:101,cat:"Périmètre",type:"mcq",q:"Un véhicule de société appartenant à l'entreprise qui roule au diesel : ses émissions de combustion relèvent de quel scope ?",o:["Scope 1","Scope 2","Scope 3","Scope 1 et 3 simultanément"],a:0,e:"Les émissions de combustion d'un véhicule appartenant à l'entreprise (flotte propre) sont en Scope 1 (combustion de sources mobiles). Si le véhicule est loué ou si l'employé utilise son propre véhicule, ça passe en Scope 3."},
{id:102,cat:"Périmètre",type:"mcq",q:"Les achats de matières premières (acier, plastique, etc.) par une entreprise relèvent de quel scope ?",o:["Scope 1","Scope 2","Scope 3","Hors périmètre"],a:2,e:"Les achats de matières premières (et plus généralement tous les achats de biens et services) sont en Scope 3 amont. L'empreinte carbone de production de ces matières (extraction, transformation, transport) est comptabilisée dans ce scope. Inclus dès le niveau Initial."},
{id:103,cat:"Comptabilisation",type:"mcq",q:"Quel est le Potentiel de Réchauffement Global du SF₆ (hexafluorure de soufre) sur 100 ans ?",o:["265","7 390","23 500","16 100"],a:2,e:"Le SF₆ a un PRG de 23 500 sur 100 ans (AR5). C'est l'un des GES les plus puissants. Il est utilisé dans les appareillages électriques haute tension comme isolant. Une fuite de quelques grammes équivaut à plusieurs centaines de kg de CO₂."},
{id:104,cat:"Historique",type:"mcq",q:"La Base Empreinte® (base nationale de facteurs d'émission) est gérée par :",o:["L'ABC","L'ADEME","Le GHG Protocol","L'ISO"],a:1,e:"La Base Empreinte® (anciennement Base Carbone®, renommée en 2021) est la base de données nationale de référence des facteurs d'émission, gérée par l'ADEME. Elle est publique et gratuite. À distinguer de la méthode Bilan Carbone® gérée par l'ABC."},
{id:105,cat:"Niveaux de Maturité",type:"mcq",q:"Un bilan GES réalisé avec la méthode Bilan Carbone® au niveau Initial inclut obligatoirement :",o:["Uniquement les Scopes 1 et 2","Les Scopes 1, 2, et les principaux postes du Scope 3","Les Scopes 1, 2 et la totalité du Scope 3","Uniquement le Scope 3"],a:1,e:"Le niveau Initial inclut les Scopes 1 et 2 (complets) plus les principaux postes du Scope 3 : achats, fret, déplacements professionnels, domicile-travail, déchets directs, immobilisations. Le niveau Avancé inclut la totalité du Scope 3."},
{id:106,cat:"Objectifs & Principes",type:"mcq",q:"L'article 75 de la loi Grenelle II impose le BEGES tous les combien d'années ?",o:["2 ans","3 ans","4 ans","5 ans"],a:2,e:"L'article 75 de la loi Grenelle II (Décret 2011-829) impose la réalisation d'un Bilan des Émissions de GES (BEGES) tous les 4 ans. Depuis 2023, un plan de transition doit obligatoirement accompagner ce bilan."},
{id:107,cat:"Périmètre",type:"mcq",q:"Les émissions fugitives de fluides frigorigènes (HFC) appartiennent à quel scope ?",o:["Scope 1","Scope 2","Scope 3","Ce ne sont pas des GES"],a:0,e:"Les fuites de fluides frigorigènes (HFC, composés à très fort PRG) sont des émissions fugitives et relèvent donc du Scope 1 (émissions directes). Elles sont souvent sous-estimées mais peuvent représenter un poste significatif dans les émissions directes."},
{id:108,cat:"Périmètre",type:"mcq",q:"Quel scope est le plus souvent le plus important en volume d'émissions pour une entreprise ?",o:["Scope 1 uniquement","Scope 2 uniquement","Scope 3","Scopes 1 et 2 à égalité"],a:2,e:"Le Scope 3 représente souvent 60 à 80% voire plus des émissions totales d'une organisation, car il englobe toute la chaîne de valeur (achats, utilisation des produits, transports, etc.). C'est pourquoi son inclusion est fondamentale pour une vision complète."},
{id:109,cat:"Périmètre",type:"mcq",q:"Dans le Bilan Carbone®, le transport de marchandises réalisé par un transporteur externe est en :",o:["Scope 1 (combustion mobile)","Scope 2","Scope 3","Hors périmètre"],a:2,e:"Si le transport est réalisé par un prestataire externe, les émissions sont en Scope 3. Seul le transport effectué par les propres véhicules de l'organisation relève du Scope 1."},
{id:110,cat:"Comptabilisation",type:"mcq",q:"Laquelle de ces affirmations sur le PRG (Potentiel de Réchauffement Global) est correcte ?",o:["Le PRG est constant et ne change jamais","Le PRG du CO₂ est de 1 et sert de référence","Le PRG est calculé sur 50 ans par convention","Le PRG mesure la toxicité d'un gaz"],a:1,e:"Le CO₂ est le gaz de référence avec un PRG = 1 sur 100 ans. Le PRG mesure la capacité d'un GES à piéger la chaleur dans l'atmosphère par rapport au CO₂ sur 100 ans. Il évolue selon les rapports du GIEC (AR4, AR5, AR6) et s'applique sur 100 ans par convention internationale."},
{id:111,cat:"Objectifs & Principes",type:"mcq",q:"Une entreprise de 300 salariés basée en France métropolitaine est-elle soumise à l'obligation BEGES ?",o:["Oui, le seuil est 250 salariés en France métropolitaine","Non, le seuil est 500 salariés en France métropolitaine","Oui, toutes les entreprises privées y sont soumises","Non, seules les collectivités sont soumises"],a:1,e:"En France métropolitaine, l'obligation BEGES s'applique aux entreprises de plus de 500 salariés. Le seuil de 250 salariés s'applique dans les DOM-TOM. Cette entreprise de 300 salariés n'est donc pas soumise à l'obligation (mais peut réaliser un bilan volontaire)."},
{id:112,cat:"Périmètre",type:"mcq",q:"Les vols d'affaires d'un employé (billets achetés par l'entreprise) sont comptabilisés dans quel scope ?",o:["Scope 1","Scope 2","Scope 3","Hors périmètre pour les déplacements aériens"],a:2,e:"Les déplacements professionnels réalisés via des prestataires de transport (avion, train, taxi, location) sont en Scope 3. Le Scope 1 s'appliquerait uniquement si l'entreprise possédait ses propres avions. Les déplacements professionnels sont inclus dès le niveau Initial."},
{id:113,cat:"Historique",type:"mcq",q:"Quelle est la différence principale entre la méthode Bilan Carbone® et le GHG Protocol ?",o:["Il n'y a aucune différence, ce sont les mêmes","Le GHG Protocol est français, le Bilan Carbone® est international","Le Bilan Carbone® est une méthode française (ABC/ADEME), le GHG Protocol est un standard international (WRI/WBCSD)","Le GHG Protocol ne comptabilise pas le Scope 3"],a:2,e:"Le Bilan Carbone® est une méthode française développée par l'ADEME et gérée par l'ABC, avec sa propre structuration en postes et domaines. Le GHG Protocol est le standard international publié par le WRI et le WBCSD, à l'origine des 3 scopes. Les deux méthodes sont compatibles mais distinctes."},
{id:114,cat:"Comptabilisation",type:"mcq",q:"Quel est le PRG du N₂O (protoxyde d'azote) selon le AR5 du GIEC ?",o:["28","120","265","298"],a:2,e:"Le N₂O a un PRG de 265 selon le AR5 (298 selon l'AR4). Il est principalement émis par l'agriculture (utilisation d'engrais azotés), la combustion et l'industrie chimique. C'est l'un des trois GES les plus importants à retenir avec CO₂ et CH₄."},
{id:115,cat:"Périmètre",type:"mcq",q:"L'amortissement carbone des bâtiments et équipements (immobilisations) appartient à quel scope ?",o:["Scope 1","Scope 2","Scope 3","Il n'est pas comptabilisé dans le Bilan Carbone®"],a:2,e:"L'empreinte carbone de la fabrication des bâtiments et équipements est amortie sur leur durée de vie et comptabilisée en Scope 3 (immobilisations). On parle de 'carbone gris' ou 'carbone incorporé'. Ce poste est important dans les secteurs à forte intensité capitalistique."},
{id:116,cat:"Objectifs & Principes",type:"mcq",q:"Quelle loi française a rendu obligatoire la réalisation d'un BEGES pour les grandes entreprises ?",o:["Loi Sapin II (2016)","Loi Vigilance (2017)","Loi Grenelle II — Article 75 (2010)","Loi PACTE (2019)"],a:2,e:"L'article 75 de la loi Grenelle II (2010), mis en application par le décret 2011-829, a rendu obligatoire la réalisation d'un BEGES pour les entreprises >500 sal., collectivités >50 000 hab. et administrations >250 agents."},
{id:117,cat:"Périmètre",type:"mcq",q:"Dans une approche par contrôle opérationnel, une filiale dans laquelle l'entreprise a le contrôle opérationnel (mais seulement 40% du capital) est-elle incluse dans le périmètre Scope 1 ?",o:["Non, car la participation est inférieure à 50%","Oui, car l'entreprise exerce le contrôle opérationnel","Uniquement à hauteur de 40%","Elle ne peut jamais être incluse dans le Scope 1"],a:1,e:"Dans l'approche par contrôle opérationnel, si l'entreprise a l'autorité d'introduire et de mettre en œuvre des politiques opérationnelles sur cette filiale, ses émissions sont incluses à 100% dans le Scope 1, quelle que soit le taux de participation capitalistique."},
{id:118,cat:"Synthèse & Restitution",type:"mcq",q:"Quelle directive européenne de 2023 élargit les obligations de reporting non-financier (incluant les GES) aux entreprises de plus de 250 salariés ?",o:["Directive TCFD","Directive SFDR","Directive CSRD","Directive ETS"],a:2,e:"La CSRD (Corporate Sustainability Reporting Directive, 2023) élargit progressivement les obligations de reporting de durabilité (dont les GES) aux entreprises de plus de 250 salariés. Elle remplace la NFRD et s'appuie sur les standards ESRS (dont ESRS E1 pour le climat)."},
{id:119,cat:"Périmètre",type:"mcq",q:"Une entreprise fait livrer ses produits à ses clients par un transporteur externe. Ces émissions sont classées en :",o:["Scope 1 (combustion mobile)","Scope 3 amont (fret entrant)","Scope 3 aval (fret sortant)","Hors périmètre car c'est un prestataire"],a:2,e:"La livraison des produits finis aux clients par un transporteur externe est du fret aval, classé en Scope 3 aval. Le fret entrant (matières premières arrivant vers l'usine) est Scope 3 amont. Cette distinction amont/aval est importante à maîtriser."},
{id:120,cat:"Plan de Transition",type:"mcq",q:"Quel référentiel permet aux entreprises de valider des objectifs de réduction de GES alignés sur les scénarios climatiques 1,5°C / 2°C ?",o:["ISO 14001","SBTi (Science Based Targets initiative)","Label Bas Carbone","ISO 14064"],a:1,e:"La Science Based Targets initiative (SBTi) est le référentiel permettant aux entreprises de faire valider des objectifs de réduction GES scientifiquement fondés et alignés sur les trajectoires 1,5°C ou 2°C des Accords de Paris. Le Label Bas Carbone est un outil français de financement de projets de séquestration carbone."},
];

{id:"O3",cat:"Plan de Transition",type:"ord",q:"Remettez les 5 sous-étapes du plan de transition dans le bon ordre :",items:[{id:"p1",l:"Définition des objectifs"},{id:"p2",l:"Construction du plan d'action"},{id:"p3",l:"Définition de la trajectoire de transition"},{id:"p4",l:"Mise en œuvre du plan de transition"},{id:"p5",l:"Suivi et pilotage du plan de transition"}],correct:["p1","p2","p3","p4","p5"],e:"(5.1) DÉFINITION DES OBJECTIFS — vision 2030/2050, trajectoire top-down. (5.2) CONSTRUCTION DU PLAN D'ACTION — fiches actions, potentiels de réduction. (5.3) DÉFINITION DE LA TRAJECTOIRE — approche bottom-up. (5.4) MISE EN ŒUVRE des actions. (5.5) SUIVI ET PILOTAGE — indicateurs, tableau de bord."},
{id:"O4",cat:"Mobilisation",type:"ord",q:"Remettez les moments de mobilisation dans le bon ordre chronologique :",items:[{id:"m1",l:"Au lancement et cadrage (sensibilisation/vulgarisation)"},{id:"m2",l:"Au lancement de la collecte (responsabilisation)"},{id:"m3",l:"À l'issue du profil GES (restitution intermédiaire)"},{id:"m4",l:"Pour la construction du plan de transition (coconstruction)"},{id:"m5",l:"En synthèse de la démarche (communication finale)"}],correct:["m1","m2","m3","m4","m5"],e:"(1) Lancement/cadrage : sensibiliser et vulgariser les enjeux. (2) Avant la collecte : responsabiliser les détenteurs de données. (3) Après le profil GES : restitution intermédiaire des résultats. (4) Plan de transition : coconstruire les actions avec les PP. (5) Synthèse : communication finale."},

function shuf(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

// ── LOCALSTORAGE ──────────────────────────────────────────────────────────────
const LS_KEY = "qcm_bc_v2";

function loadLS() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    return raw ? JSON.parse(raw) : { starred: [], attempts: {}, successes: {}, lastSession: null };
  } catch { return { starred: [], attempts: {}, successes: {}, lastSession: null }; }
}

function saveLS(ls) {
  try { localStorage.setItem(LS_KEY, JSON.stringify(ls)); } catch {}
}

function toggleStar(id) {
  const ls = state.ls;
  const idx = ls.starred.indexOf(id);
  if (idx === -1) ls.starred.push(id);
  else ls.starred.splice(idx, 1);
  saveLS(ls);
  setState({ ls });
}

function isStarred(id) { return state.ls.starred.includes(String(id)); }

// ── STATE ─────────────────────────────────────────────────────────────────────
let state = {
  mode: "menu",
  quizMode: "study", // study | exam
  timerActive: false,
  timerDuration: 45 * 60,
  timerElapsed: 0,
  timerInterval: null,
  selCats: new Set(CATS),
  inclOrd: true,
  inclTF: true,
  inclMulti: true,
  inclMatch: true,
  inclBlank: true,
  filterStarred: false,
  qs: [], cur: 0, sel: null, conf: false, score: 0, ans: [], showExp: false,
  revIdx: 0,
  dragItems: {}, dragIdx: null, dragDone: {}, dragOk: {},
  matchSel: {},
  matchDone: {},
  matchOk: {},
  blankVal: {},
  blankDone: {},
  blankOk: {},
  ls: loadLS(),
};

function setState(patch){
  if(typeof patch === "function") patch = patch(state);
  state = {...state, ...patch};
  render();
}

// ── LOGIQUE ───────────────────────────────────────────────────────────────────
function start() {
  const cats = state.selCats;
  const starred = state.filterStarred ? new Set(state.ls.starred.map(String)) : null;

  const filterQ = (arr) => {
    let res = arr.filter(q => cats.has(q.cat));
    if (starred) res = res.filter(q => starred.has(String(q.id)));
    return shuf(res);
  };

  const mcq = filterQ(Q);
  const ord = state.inclOrd ? filterQ(ORD) : [];
  const tf  = state.inclTF  ? filterQ(TF)  : [];
  const multi = state.inclMulti ? filterQ(MULTI) : [];
  const match = state.inclMatch ? filterQ(MATCH) : [];
  const blank = state.inclBlank ? filterQ(BLANK) : [];
  const all = shuf([...mcq, ...ord, ...tf, ...multi, ...match, ...blank]);

  const di = {}, dd = {}, dok = {};
  all.filter(q => q.type === "ord").forEach(q => {
    di[q.id] = shuf(q.items); dd[q.id] = false; dok[q.id] = false;
  });

  const ms = {}, md = {}, mok = {};
  all.filter(q => q.type === "match").forEach(q => {
    ms[q.id] = { leftIdx: null, pairs: {} };
    md[q.id] = false; mok[q.id] = false;
  });

  const bv = {}, bd = {}, bok = {};
  all.filter(q => q.type === "blank").forEach(q => {
    bv[q.id] = ""; bd[q.id] = false; bok[q.id] = false;
  });

  if (state.timerInterval) clearInterval(state.timerInterval);
  let interval = null;
  if (state.timerActive) {
    interval = setInterval(() => {
      setState(s => ({ timerElapsed: s.timerElapsed + 1 }));
    }, 1000);
  }

  setState({
    mode: "quiz", qs: all, cur: 0, sel: null, conf: false,
    score: 0, ans: [], showExp: false,
    dragItems: di, dragDone: dd, dragOk: dok,
    matchSel: ms, matchDone: md, matchOk: mok,
    blankVal: bv, blankDone: bd, blankOk: bok,
    timerElapsed: 0, timerInterval: interval,
  });
}

function confirm_answer(){
  if(state.sel===null)return;
  const q=state.qs[state.cur];
  const ok=state.sel===q.a;
  setState({conf:true,score:state.score+(ok?1:0),ans:[...state.ans,{id:q.id,sel:state.sel,ok}]});
}

function next() {
  if (state.cur + 1 >= state.qs.length) {
    if (state.timerInterval) clearInterval(state.timerInterval);
    const ls = state.ls;
    ls.lastSession = { score: state.score, total: state.qs.length, date: new Date().toISOString().slice(0,10) };
    saveLS(ls);
    setState({ mode: "results", timerInterval: null });
  } else {
    setState({ cur: state.cur + 1, sel: null, conf: false, showExp: false });
  }
}

function prev() {
  if (state.cur === 0) return;
  const wasConf = state.conf;
  const lastAns = wasConf ? state.ans[state.ans.length - 1] : null;
  setState({
    cur: state.cur - 1,
    sel: null, conf: false, showExp: false,
    score: lastAns && lastAns.ok ? state.score - 1 : state.score,
    ans: wasConf ? state.ans.slice(0, -1) : state.ans,
  });
}

function tog(cat){
  const s=new Set(state.selCats);
  s.has(cat)?s.delete(cat):s.add(cat);
  setState({selCats:s});
}

function pct(n,d){return d===0?0:Math.round(n/d*100);}

// ── DRAG & DROP (ORD) ─────────────────────────────────────────────────────────
function dragStart(qid,idx){setState({dragIdx:idx});}
function dragOver(e,qid,idx){
  e.preventDefault();
  if(state.dragIdx===null||state.dragIdx===idx)return;
  const items=[...state.dragItems[qid]];
  const moved=items.splice(state.dragIdx,1)[0];
  items.splice(idx,0,moved);
  setState({dragItems:{...state.dragItems,[qid]:items},dragIdx:idx});
}
function dragEnd(){setState({dragIdx:null});}
function submitDrag(qid){
  const q=state.qs.find(x=>x.id===qid);
  const current=state.dragItems[qid];
  const ok=current.every((item,i)=>item.id===q.correct[i]);
  const newDone={...state.dragDone,[qid]:true};
  const newOk={...state.dragOk,[qid]:ok};
  setState({dragDone:newDone,dragOk:newOk,conf:true,score:state.score+(ok?1:0),ans:[...state.ans,{id:qid,ok}]});
}

// ── DOM HELPERS ───────────────────────────────────────────────────────────────
function h(tag,attrs,...children){
  const el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object")Object.assign(el.style,v);
    else if(k.startsWith("on"))el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="className")el.className=v;
    else if(typeof v==="boolean"){if(v)el.setAttribute(k,"");else el.removeAttribute(k);}
    else el.setAttribute(k,v);
  });
  children.flat().forEach(c=>{
    if(c==null)return;
    el.appendChild(typeof c==="string"?document.createTextNode(c):c);
  });
  return el;
}
const div=(...a)=>h("div",...a);
const span=(...a)=>h("span",...a);
const btn=(...a)=>h("button",...a);
const p=(...a)=>h("p",...a);

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){
  const app=document.getElementById("app");
  const newNode=buildView();
  app.replaceChildren(newNode);
}

function buildView(){
  switch(state.mode){
    case"menu":   return buildMenu();
    case"filter": return buildFilter();
    case"quiz":   return buildQuiz();
    case"results":return buildResults();
    case"review": return buildReview();
    default:      return buildMenu();
  }
}
