// ── FILTRE ────────────────────────────────────────────────────────────────────
function buildFilter(){
  const cnt =
    Q.filter(q => state.selCats.has(q.cat)).length +
    (state.inclOrd   ? ORD.filter(o => state.selCats.has(o.cat)).length : 0) +
    (state.inclTF    ? TF.filter(q => state.selCats.has(q.cat)).length  : 0) +
    (state.inclMulti ? MULTI.filter(q => state.selCats.has(q.cat)).length : 0) +
    (state.inclMatch ? MATCH.filter(q => state.selCats.has(q.cat)).length : 0) +
    (state.inclBlank ? BLANK.filter(q => state.selCats.has(q.cat)).length : 0);

  const rows=CATS.map(cat=>{
    const active=state.selCats.has(cat);
    const catCnt=Q.filter(q=>q.cat===cat).length+ORD.filter(o=>o.cat===cat).length
      +TF.filter(q=>q.cat===cat).length+MULTI.filter(q=>q.cat===cat).length
      +MATCH.filter(q=>q.cat===cat).length+BLANK.filter(q=>q.cat===cat).length;
    return div({className:"cat-row"+(active?" active":""),onClick:()=>tog(cat)},
      div({className:"cat-dot",style:{background:active?(CC[cat]||"#52B788"):"#2A3A52"}}),
      span({className:"cat-name"},cat),
      span({className:"cat-count"},catCnt+" q"),
      span({className:"cat-check"},active?"✓":""),
    );
  });

  const inclRow=(label,key)=>div({
    style:{display:"flex",alignItems:"center",gap:"8px",padding:"8px 12px",borderRadius:"9px",background:"#131D2A",border:"1px solid #2A3A52",marginBottom:"5px",cursor:"pointer"},
    onClick:()=>setState({[key]:!state[key]})
  },
    span({style:{flex:1,fontSize:"13px",color:state[key]?"#C8D8E8":"#6A7D90"}},label),
    span({style:{fontSize:"16px"}},state[key]?"✓":""),
  );

  return div({},
    div({style:{display:"flex",alignItems:"center",gap:"10px",marginBottom:"16px"}},
      btn({className:"btn-sm",onClick:()=>setState({mode:"menu"})},"← Retour"),
      h("h1",{style:{fontSize:"18px"}},"Filtres"),
    ),
    p({className:"section-title"},"Thèmes"),
    ...rows,
    p({className:"section-title",style:{marginTop:"14px"}},"Types de questions"),
    inclRow("Inclure les questions Ordonnancement (ORD)","inclOrd"),
    inclRow("Inclure les questions Vrai/Faux (TF)","inclTF"),
    inclRow("Inclure les questions Multi-réponses (MULTI)","inclMulti"),
    inclRow("Inclure les questions Associations (MATCH)","inclMatch"),
    inclRow("Inclure les questions Texte à trous (BLANK)","inclBlank"),
    p({className:"total-count"},`${cnt} question${cnt>1?"s":""} sélectionnée${cnt>1?"s":""}`),
    div({className:"flex-center"},
      btn({className:"btn",onClick:start,disabled:cnt===0},"▶ Lancer le quiz"),
      btn({className:"btn-sm",onClick:()=>setState({mode:"menu"})},"← Menu"),
    )
  );
}

// ── QUIZ ──────────────────────────────────────────────────────────────────────
function buildQuiz(){
  const curQ=state.qs[state.cur];
  if(!curQ)return div({},"Aucune question.");
  const progress=((state.cur)/(state.qs.length))*100;
  const children=[];

  // Progress + meta
  children.push(div({className:"progress-wrap"},div({className:"progress-bar",style:{width:progress+"%"}})));
  const metaItems=[
    span({className:"counter"},`${state.cur+1} / ${state.qs.length}`),
  ];
  if(curQ.cat) metaItems.push(span({className:"badge",style:{background:CC[curQ.cat]||"#2A3A52"}},curQ.cat));
  const typeLabels={mcq:"MCQ",ord:"ORD",tf:"V/F",multi:"MULTI",match:"ASSOC",blank:"TROUS"};
  const typeColors={mcq:"#3D5A80",ord:"#E9A23B",tf:"#6B4226",multi:"#5B2D8E",match:"#1B6CA8",blank:"#2D6A4F"};
  metaItems.push(span({className:"badge",style:{background:typeColors[curQ.type]||"#2A3A52"}},typeLabels[curQ.type]||curQ.type));
  if(state.timerActive){
    const remaining=state.timerDuration-state.timerElapsed;
    const m=Math.floor(Math.abs(remaining)/60);
    const s=Math.abs(remaining)%60;
    const over=remaining<0;
    metaItems.push(span({style:{color:over?"#E07A5F":"#8A9DB5",fontSize:"12px"}},(over?"⏱ +":"⏱ ")+m+":"+(s<10?"0"+s:s)));
  }
  metaItems.push(span({className:"score-chip"},`Score: ${state.score}`));
  if(state.cur > 0) metaItems.push(btn({className:"btn-sm",onClick:prev,style:{marginLeft:"4px",padding:"3px 10px",fontSize:"12px"}},"← Précédent"));
  children.push(div({className:"quiz-meta"},...metaItems));

  // Question text
  children.push(p({className:"q-text"},curQ.q));

  // Question body by type
  if (curQ.type === "ord") {
    const qid=curQ.id;
    const items=state.dragItems[qid]||curQ.items;
    const done=state.dragDone[qid];
    const allOk=state.dragOk[qid];
    if(!done) children.push(p({className:"drag-hint"},"Glissez-déposez les éléments dans le bon ordre."));
    items.forEach((item,idx)=>{
      let cls="drag-item";
      if(done){
        cls+=item.id===curQ.correct[idx]?" correct-pos":" wrong-pos";
      }
      const el=div({
        className:cls,
        draggable:done?"false":"true",
        onDragstart:done?null:()=>dragStart(qid,idx),
        onDragover:done?null:(e)=>dragOver(e,qid,idx),
        onDragend:done?null:dragEnd,
      },
        div({className:"drag-num"},idx+1),
        span({},item.l),
        done?span({style:{marginLeft:"auto"}},item.id===curQ.correct[idx]?"✓":"✗"):"",
      );
      children.push(el);
    });
    if(!done){
      children.push(div({className:"actions"},
        btn({className:"btn",onClick:()=>submitDrag(qid)},"Valider l'ordre"),
      ));
    }
  } else if (curQ.type === "tf") {
    children.push(buildTF(curQ));
  } else if (curQ.type === "multi") {
    children.push(...buildMulti(curQ));
  } else if (curQ.type === "match") {
    children.push(...buildMatch(curQ));
  } else if (curQ.type === "blank") {
    children.push(...buildBlank(curQ));
  } else {
    // mcq
    const opts=curQ.o.map((opt,i)=>{
      let cls="opt";
      if(state.conf){
        cls+=" locked";
        if(i===curQ.a) cls+=" correct";
        else if(i===state.sel) cls+=" wrong";
      } else if(state.sel===i) cls+=" selected";
      return btn({className:cls,onClick:state.conf?null:()=>setState({sel:i})},
        span({className:"letter"},"ABCD"[i]),
        span({style:{flex:1}},opt),
        state.conf&&i===curQ.a?span({className:"tick"},"✓"):"",
        state.conf&&i===state.sel&&i!==curQ.a?span({className:"tick"},"✗"):"",
      );
    });
    children.push(div({className:"options"},...opts));
    if(!state.conf){
      children.push(div({className:"actions"},
        btn({className:"btn",disabled:state.sel===null,onClick:confirm_answer},"Valider"),
      ));
    }
  }

  // Feedback (after conf) — uniquement pour mcq et ord (tf, multi, match gèrent leur propre feedback)
  if(state.conf && curQ.type !== "tf" && curQ.type !== "multi" && curQ.type !== "match" && curQ.type !== "blank"){
    const isOrd=curQ.type==="ord";
    const ok=isOrd?state.dragOk[curQ.id]:(state.sel===curQ.a);
    if(state.quizMode === "exam"){
      children.push(div({className:"actions"},
        btn({className:"btn",onClick:next},state.cur+1>=state.qs.length?"Voir les résultats":"Question suivante →"),
      ));
    } else {
      children.push(div({className:"feedback "+(ok?"ok":"ko")},
        span({},ok?"✓ Bonne réponse !":"✗ Mauvaise réponse"),
        buildStarBtn(curQ.id),
      ));
      if(!ok) {
        children.push(div({className:"exp-box"},curQ.e));
      } else {
        children.push(btn({className:"exp-btn",onClick:()=>setState({showExp:!state.showExp})},
          state.showExp?"▲ Masquer l'explication":"▼ Voir l'explication"
        ));
        if(state.showExp) children.push(div({className:"exp-box"},curQ.e));
      }
      children.push(div({className:"actions"},
        btn({className:"btn",onClick:next},state.cur+1>=state.qs.length?"Voir les résultats":"Question suivante →"),
      ));
    }
  }

  return div({},...children);
}

// ── VRAI / FAUX ───────────────────────────────────────────────────────────────
function buildTF(q) {
  const { conf, sel, showExp, quizMode } = state;
  const isStudy = quizMode === "study";
  const children = [];

  const tfRow = div({ style: { display: "flex", gap: "10px", marginBottom: "16px" } }, [
    btn({
      class: `opt${sel === 1 ? " selected" : ""}${conf ? " locked" : ""}${conf && q.a === true ? " correct" : ""}${conf && sel === 1 && q.a !== true ? " wrong" : ""}`,
      style: { flex: "1", justifyContent: "center", fontSize: "16px", fontWeight: "700" },
      onclick: conf ? null : () => setState({ sel: 1 }),
    }, [span({ class: "letter" }, "V"), "Vrai", conf && q.a === true ? span({ class: "tick" }, "✓") : null]),
    btn({
      class: `opt${sel === 0 ? " selected" : ""}${conf ? " locked" : ""}${conf && q.a === false ? " correct" : ""}${conf && sel === 0 && q.a !== false ? " wrong" : ""}`,
      style: { flex: "1", justifyContent: "center", fontSize: "16px", fontWeight: "700" },
      onclick: conf ? null : () => setState({ sel: 0 }),
    }, [span({ class: "letter" }, "F"), "Faux", conf && q.a === false ? span({ class: "tick" }, "✓") : null]),
  ]);
  children.push(tfRow);

  if (conf) {
    const ok = (sel === 1 && q.a === true) || (sel === 0 && q.a === false);
    if (isStudy) {
      children.push(div({ class: `feedback ${ok ? "ok" : "ko"}` }, [
        span({ style: { fontSize: "18px" } }, ok ? "✅" : "❌"),
        span({ style: { fontWeight: "600", fontSize: "14px" } }, ok ? "Bonne réponse !" : `Incorrect — Réponse : ${q.a ? "Vrai" : "Faux"}`),
        buildStarBtn(q.id),
      ]));
      if (!ok) {
        children.push(div({ class: "exp-box" }, q.e));
      } else {
        if (showExp) children.push(div({ class: "exp-box" }, q.e));
        else children.push(btn({ class: "exp-btn", onclick: () => setState({ showExp: true }) }, "▼ Voir l'explication"));
      }
    }
  }

  children.push(div({ class: "actions" }, [
    !conf
      ? btn({ class: "btn", style: { opacity: sel === null ? 0.4 : 1 }, onclick: sel !== null ? confirmTF : null }, "Valider →")
      : btn({ class: "btn", onclick: next }, state.cur + 1 >= state.qs.length ? "Voir les résultats →" : "Question suivante →"),
  ]));
  return div({}, children);
}

function confirmTF() {
  const q = state.qs[state.cur];
  const ok = (state.sel === 1 && q.a === true) || (state.sel === 0 && q.a === false);
  setState(s => ({ conf: true, score: ok ? s.score + 1 : s.score, ans: [...s.ans, { id: q.id, sel: s.sel, ok }] }));
}

function buildStarBtn(id) {
  const starred = isStarred(id);
  return btn({
    class: "btn-sm",
    style: { marginLeft: "auto", background: "none", border: "none", fontSize: "16px", cursor: "pointer", padding: "0 4px" },
    onclick: () => toggleStar(id),
    title: starred ? "Retirer des favoris" : "Ajouter aux favoris",
  }, starred ? "⭐" : "☆");
}

// ── MULTI-RÉPONSES ────────────────────────────────────────────────────────────
function buildMulti(q) {
  const { conf, showExp } = state;
  const sel = state.sel instanceof Set ? state.sel : new Set();
  const children = [];

  children.push(p({style:{color:"#8A9DB5",fontSize:"13px",marginBottom:"10px",fontStyle:"italic"}}, "Plusieurs réponses possibles"));

  const opts = q.o.map((opt, i) => {
    const isSelected = sel.has(i);
    const isCorrect = q.a.includes(i);
    let cls = "opt";
    if (conf) {
      cls += " locked";
      if (isCorrect) cls += " correct";
      else if (isSelected) cls += " wrong";
    } else if (isSelected) {
      cls += " selected";
    }
    const tick = conf
      ? (isCorrect ? span({className:"tick"}, "✓") : (isSelected ? span({className:"tick"}, "✗") : ""))
      : "";
    return btn({
      className: cls,
      onClick: conf ? null : () => {
        const cur = state.sel instanceof Set ? new Set(state.sel) : new Set();
        if (cur.has(i)) cur.delete(i); else cur.add(i);
        setState({ sel: cur });
      },
    },
      span({className:"letter"}, isSelected ? "☑" : "☐"),
      span({style:{flex:1}}, opt),
      tick,
    );
  });

  children.push(div({className:"options"}, ...opts));

  if (!conf) {
    children.push(div({className:"actions"},
      btn({className:"btn", disabled: sel.size === 0, onClick: confirmMulti}, "Valider"),
    ));
  }

  if (conf) {
    const ok = q.a.length === sel.size && q.a.every(i => sel.has(i));
    if (state.quizMode === "study") {
      children.push(div({className:"feedback " + (ok ? "ok" : "ko")},
        span({}, ok ? "✓ Bonne réponse !" : "✗ Incomplet ou incorrect"),
        buildStarBtn(q.id),
      ));
      if (!ok) {
        children.push(div({className:"exp-box"}, q.e));
      } else {
        if (showExp) children.push(div({className:"exp-box"}, q.e));
        else children.push(btn({className:"exp-btn", onClick:()=>setState({showExp:true})}, "▼ Voir l'explication"));
      }
    }
    children.push(div({className:"actions"},
      btn({className:"btn", onClick:next}, state.cur + 1 >= state.qs.length ? "Voir les résultats →" : "Question suivante →"),
    ));
  }

  return children;
}

function confirmMulti() {
  const q = state.qs[state.cur];
  const sel = state.sel instanceof Set ? state.sel : new Set();
  const ok = q.a.length === sel.size && q.a.every(i => sel.has(i));
  setState(s => ({ conf: true, score: ok ? s.score + 1 : s.score, ans: [...s.ans, { id: q.id, sel: [...sel], ok }] }));
}

// ── ASSOCIATIONS (MATCH) ──────────────────────────────────────────────────────
function shuffle(arr){
  const a=[...arr.map((_,i)=>i)];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function buildMatch(q) {
  const qid = q.id;
  // Init state if needed
  if (!state.matchSel[qid] || !state.matchSel[qid].rightOrder) {
    const ms = { ...state.matchSel };
    ms[qid] = { rightOrder: shuffle(q.pairs), links: {}, selLeft: null };
    state = { ...state, matchSel: ms };
  }
  const ms = state.matchSel[qid];
  const done = state.matchDone[qid];
  const allOk = state.matchOk[qid];
  const { rightOrder, links, selLeft } = ms;
  const children = [];

  // How many pairs are linked
  const linkedCount = Object.keys(links).length;
  const allLinked = linkedCount === q.pairs.length;

  children.push(p({style:{color:"#8A9DB5",fontSize:"13px",marginBottom:"10px",fontStyle:"italic"}},
    done ? "" : "Cliquez sur un élément gauche, puis sur l'élément droit correspondant."));

  const grid = div({className:"match-grid"});

  q.pairs.forEach((pair, li) => {
    // Determine if this left is linked
    const linkedRightOrderIdx = links[li] !== undefined ? links[li] : null;
    const linkedRightOrigIdx = linkedRightOrderIdx !== null ? rightOrder[linkedRightOrderIdx] : null;
    const linkedLabel = linkedRightOrigIdx !== null ? q.pairs[linkedRightOrigIdx].right : null;

    let leftCls = "match-left";
    if (done) {
      // rightOrder[links[li]] === li means correct
      const correct = linkedRightOrderIdx !== null && rightOrder[linkedRightOrderIdx] === li;
      leftCls += correct ? " done-ok" : " done-ko";
    } else if (selLeft === li) {
      leftCls += " sel";
    }

    const leftText = done && linkedLabel
      ? pair.left + " → " + linkedLabel + (rightOrder[links[li]] === li ? " ✓" : " ✗")
      : (linkedLabel ? pair.left + " → " + linkedLabel : pair.left);

    grid.appendChild(btn({
      className: leftCls,
      disabled: done,
      onClick: done ? null : () => {
        const cur = state.matchSel[qid];
        setState({ matchSel: { ...state.matchSel, [qid]: { ...cur, selLeft: cur.selLeft === li ? null : li } } });
      },
    }, leftText));

    // Right side: show the right item at rightOrder[li] position
    const ri = rightOrder[li]; // original pair index shown in row li
    // Find if this right slot (position li in rightOrder) is already linked
    const isLinked = Object.values(links).includes(li);

    let rightCls = "match-right";
    if (done) {
      // The correct left for ri is ri itself (pairs[ri].right should match pairs[ri].left)
      // Find which left chose this right slot (li)
      const whoLinked = Object.entries(links).find(([,v]) => v === li);
      if (whoLinked) {
        const leftIdx = parseInt(whoLinked[0]);
        rightCls += rightOrder[li] === leftIdx ? " done-ok" : " done-ko";
      } else {
        rightCls += " done-ko";
      }
    } else if (isLinked) {
      rightCls += " linked";
    }

    grid.appendChild(btn({
      className: rightCls,
      disabled: done,
      onClick: done ? null : () => {
        const cur = state.matchSel[qid];
        if (cur.selLeft === null) return;
        const newLinks = { ...cur.links, [cur.selLeft]: li };
        setState({ matchSel: { ...state.matchSel, [qid]: { ...cur, links: newLinks, selLeft: null } } });
      },
    }, q.pairs[ri].right));
  });

  children.push(grid);

  if (!done) {
    children.push(div({className:"actions"},
      btn({className:"btn", disabled: !allLinked, onClick: () => confirmMatch(qid)}, "Valider les associations"),
    ));
  }

  if (done) {
    if (state.quizMode === "study") {
      children.push(div({className:"feedback " + (allOk ? "ok" : "ko")},
        span({}, allOk ? "✓ Toutes les associations sont correctes !" : "✗ Certaines associations sont incorrectes"),
        buildStarBtn(qid),
      ));
      if (!allOk) {
        children.push(div({className:"exp-box"}, q.e));
      } else {
        if (state.showExp) children.push(div({className:"exp-box"}, q.e));
        else children.push(btn({className:"exp-btn", onClick:()=>setState({showExp:true})}, "▼ Voir l'explication"));
      }
    }
    children.push(div({className:"actions"},
      btn({className:"btn", onClick:next}, state.cur + 1 >= state.qs.length ? "Voir les résultats →" : "Question suivante →"),
    ));
  }

  return children;
}

// ── TEXTE À TROUS (BLANK) ─────────────────────────────────────────────────────
function buildBlank(q) {
  const qid = q.id;
  const done = state.blankDone[qid];
  const allOk = state.blankOk[qid];
  const vals = state.blankVal[qid] || {};
  const isExam = state.quizMode === "exam";
  const children = [];

  // Bouton créé en premier pour que les inputs puissent le référencer
  const validateBtn = !done ? btn({ className: "btn", onClick: () => confirmBlank(qid) }, "Valider") : null;

  // Parse q.q, replace each [_] with an input
  const parts = q.q.split("[_]");
  const lineDiv = div({ style: { lineHeight: "2.2", fontSize: "15px", color: "#E8F4EC", marginBottom: "16px" } });

  parts.forEach((part, i) => {
    lineDiv.appendChild(document.createTextNode(part));
    if (i < q.blanks.length) {
      const inp = h("input", {
        className: "blank-input" + (done ? (((vals[i]||"").trim().toLowerCase() === q.blanks[i].trim().toLowerCase()) ? " ok" : " ko") : ""),
        type: "text",
        value: vals[i] || "",
        disabled: done,
        placeholder: "…",
        style: { verticalAlign: "middle", margin: "0 4px" },
      });
      // Mutation directe sans setState → pas de re-render → pas de perte de focus
      inp.addEventListener("input", () => {
        if (!state.blankVal[qid]) state.blankVal[qid] = {};
        state.blankVal[qid][i] = inp.value;
        if (validateBtn) validateBtn.disabled = q.blanks.some((_, j) => !(state.blankVal[qid][j]||"").trim());
      });
      lineDiv.appendChild(inp);

      if (done) {
        const correct = (vals[i]||"").trim().toLowerCase() === q.blanks[i].trim().toLowerCase();
        if (!correct) {
          const correction = div({ className: "blank-correction" }, "✗ Réponse attendue : " + q.blanks[i]);
          lineDiv.appendChild(correction);
        }
      }
    }
  });

  children.push(lineDiv);

  if (!done) {
    validateBtn.disabled = q.blanks.some((_, i) => !(vals[i]||"").trim());
    children.push(div({ className: "actions" }, validateBtn));
  }

  if (done) {
    if (!isExam) {
      children.push(div({ className: "feedback " + (allOk ? "ok" : "ko") },
        span({}, allOk ? "✓ Bonne réponse !" : "✗ Réponse incorrecte"),
        buildStarBtn(qid),
      ));
      if (!allOk) {
        children.push(div({ className: "exp-box" }, q.e));
      } else {
        if (state.showExp) children.push(div({ className: "exp-box" }, q.e));
        else children.push(btn({ className: "exp-btn", onClick: () => setState({ showExp: true }) }, "▼ Voir l'explication"));
      }
    }
    children.push(div({ className: "actions" },
      btn({ className: "btn", onClick: next }, state.cur + 1 >= state.qs.length ? "Voir les résultats →" : "Question suivante →"),
    ));
  }

  return children;
}

function confirmBlank(qid) {
  const q = state.qs.find(x => x.id === qid);
  const vals = state.blankVal[qid] || {};
  const ok = q.blanks.every((b, i) => (vals[i]||"").trim().toLowerCase() === b.trim().toLowerCase());
  setState(s => ({
    conf: true,
    blankDone: {...s.blankDone, [qid]: true},
    blankOk: {...s.blankOk, [qid]: ok},
    score: ok ? s.score + 1 : s.score,
    ans: [...s.ans, {id: qid, ok}]
  }));
}

function confirmMatch(qid) {
  const q = state.qs.find(x => x.id === qid);
  const ms = state.matchSel[qid];
  const realOk = q.pairs.every((_, i) => {
    const chosenRightOrderIdx = ms.links[i];
    return ms.rightOrder[chosenRightOrderIdx] === i;
  });
  setState(s => ({
    conf: true,
    matchDone: { ...s.matchDone, [qid]: true },
    matchOk: { ...s.matchOk, [qid]: realOk },
    score: realOk ? s.score + 1 : s.score,
    ans: [...s.ans, { id: qid, ok: realOk }],
  }));
}

// ── RÉSULTATS ─────────────────────────────────────────────────────────────────
function buildResults(){
  const total=state.qs.length;
  const score=state.score;
  const p100=pct(score,total);
  const color=p100>=70?"#52B788":p100>=50?"#F2CC8F":"#E07A5F";

  // Par catégorie
  const catStats={};
  state.ans.forEach(a=>{
    const q=state.qs.find(x=>x.id===a.id);
    if(!q)return;
    if(!catStats[q.cat])catStats[q.cat]={ok:0,total:0};
    catStats[q.cat].total++;
    if(a.ok)catStats[q.cat].ok++;
  });

  const themeRows=Object.entries(catStats).map(([cat,s])=>{
    const p=pct(s.ok,s.total);
    const c=p>=70?"#52B788":p>=50?"#F2CC8F":"#E07A5F";
    return div({className:"theme-row"},
      div({className:"theme-dot",style:{background:CC[cat]||"#2A3A52"}}),
      span({className:"theme-name"},cat),
      div({className:"mini-bar-wrap"},div({className:"mini-bar",style:{width:p+"%",background:c}})),
      span({className:"theme-score",style:{color:c}},`${s.ok}/${s.total}`),
    );
  });

  return div({},
    div({className:"results-header"},
      div({className:"big-score",style:{color}},score+"/"+total),
      p({className:"pct"},p100+"% de réussite"),
    ),
    p({className:"section-title"},"Par thème"),
    ...themeRows,
    div({className:"flex-center",style:{marginTop:"18px"}},
      btn({className:"btn",onClick:start},"Recommencer"),
      btn({className:"btn-sm",onClick:()=>setState({mode:"review",revIdx:0})},"📋 Réviser"),
      btn({className:"btn-sm",onClick:()=>setState({mode:"menu"})},"Menu"),
    )
  );
}

// ── RÉVISION ──────────────────────────────────────────────────────────────────
function buildReview(){
  const idx=state.revIdx;
  const q=state.qs[idx];
  const a=state.ans[idx];
  if(!q)return div({},"Fin de la révision.");
  const isOrd=q.type==="ord";

  return div({},
    div({className:"review-header"},
      span({className:"review-counter"},`Révision ${idx+1}/${state.qs.length}`),
      span({style:{color:a&&a.ok?"#52B788":"#E07A5F",fontSize:"14px"}},a&&a.ok?"✓":"✗"),
    ),
    p({className:"q-text"},q.q),
    isOrd?div({},
      ...(state.dragItems[q.id]||q.items).map((item,i)=>
        div({className:"drag-item "+(a&&a.ok?"correct-pos":"wrong-pos")},
          div({className:"drag-num"},i+1),
          span({},item.l),
        )
      )
    ):div({className:"options"},
      ...q.o.map((opt,i)=>{
        const ans_sel = Array.isArray(a?.sel) ? a.sel : (a?.sel != null ? [a.sel] : []);
        const isCorrect = q.type === "multi" ? q.a.includes(i) : i === q.a;
        const isWrong = !isCorrect && ans_sel.includes(i);
        return btn({
          className:"opt locked"+(isCorrect?" correct":"")+(isWrong?" wrong":""),
        },
          span({className:"letter"}, q.type === "multi" ? (ans_sel.includes(i) ? "☑" : "☐") : "ABCD"[i]),
          span({style:{flex:1}},opt),
          isCorrect?span({className:"tick"},"✓"):"",
        );
      })
    ),
    div({className:"exp-box",style:{marginTop:"12px"}},q.e),
    div({className:"actions"},
      idx>0?btn({className:"btn-sm",onClick:()=>setState({revIdx:idx-1})},"← Préc."):"",
      idx+1<state.qs.length
        ?btn({className:"btn",onClick:()=>setState({revIdx:idx+1})},"Suiv. →")
        :btn({className:"btn",onClick:()=>setState({mode:"results"})},"← Résultats"),
    )
  );
}

render();
</script>
